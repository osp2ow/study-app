<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1B3A4B" />
<title>日本語 / 한국어 学習・공부</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
  rel="stylesheet"
/>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Babel (브라우저에서 바로 JSX 해석 - 별도 빌드/컴파일 과정 불필요) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<!-- Firebase (compat 버전 - 옛날 방식 문법, CDN 스크립트 태그만으로 동작) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root {
  /* 비비드 & 활기찬 모던 팔레트 */
  --bg: #F6F7FC;
  --surface: #FFFFFF;
  --surface-alt: #EEF0FF;
  --ink: #1F2533;
  --ink-soft: #7A8094;
  --border: #E7E9F5;

  --indigo: #4F46E5;
  --indigo-dark: #3730A3;
  --indigo-soft: #EEF0FF;

  --vermillion: #FF4B4B;
  --vermillion-dark: #E13C3C;
  --vermillion-soft: #FFEAEA;

  --moss: #22C55E;
  --moss-dark: #16A34A;
  --moss-soft: #E7FBEE;

  --gold: #FF9600;
  --gold-dark: #E08600;
  --gold-soft: #FFF3E0;

  --purple: #A560F5;
  --purple-soft: #F4EBFF;

  --radius: 16px;
  --radius-sm: 12px;
  --radius-lg: 22px;
  --radius-pill: 999px;

  --shadow-sm: 0 2px 8px rgba(31, 37, 51, 0.06);
  --shadow: 0 6px 20px rgba(31, 37, 51, 0.08);
  --shadow-lg: 0 12px 32px rgba(31, 37, 51, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.jp-text {
  font-family: 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  font-weight: 700;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

.app-shell {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  min-height: 100vh;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 2px 20px;
  margin-bottom: 18px;
}

.streak-badge {
  font-family: 'Baloo 2', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold-dark);
  background: var(--gold-soft);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  white-space: nowrap;
}

.app-header h1 {
  font-family: 'Baloo 2', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 24px;
  font-weight: 800;
  margin: 0;
  color: var(--indigo);
  letter-spacing: -0.01em;
}

.app-header .subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-top: 2px;
}

.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 16px rgba(31, 37, 51, 0.06);
  max-width: 640px;
  margin: 0 auto;
  padding: 6px 10px calc(6px + env(safe-area-inset-bottom, 0px));
  gap: 6px;
}

.tab-bar button {
  flex: 1;
  padding: 10px 0;
  background: none;
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.tab-bar button.active {
  color: var(--indigo);
  background: var(--indigo-soft);
}

.hanko {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 40px;
  height: 28px;
  padding: 0 10px;
  border-radius: var(--radius-pill);
  background: var(--indigo);
  color: #fff;
  font-family: 'Baloo 2', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.genkou-card {
  position: relative;
  background: var(--surface);
  border: none;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 20px 18px;
  text-align: center;
}

.genkou-square {
  width: 92px;
  height: 92px;
  margin: 0 auto 12px;
  border-radius: var(--radius);
  background: var(--indigo-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 0 0 2px rgba(79, 70, 229, 0.12);
}

.genkou-square .char {
  font-family: 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--indigo);
}

.reading {
  font-family: 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 4px;
}

.inline-play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  margin-left: 6px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: var(--indigo-soft);
  color: var(--indigo);
  font-size: 12px;
  cursor: pointer;
  vertical-align: middle;
}

.inline-play-btn-light {
  background: rgba(255, 255, 255, 0.25);
  color: #fff;
}

.kanji-hint {
  background: var(--gold-soft);
  border-left: 4px solid var(--gold);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-size: 13px;
  color: var(--ink);
  margin: 10px 0;
}

.tile-breakdown-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 14px;
}

.tile-breakdown-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface-alt);
  border-radius: var(--radius);
}

.tile-breakdown-row .jp-text {
  font-size: 16px;
  font-weight: 700;
  min-width: 44px;
}

.tile-breakdown-meaning {
  margin-left: auto;
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 600;
}

.meaning {
  font-size: 18px;
  font-weight: 700;
  margin: 12px 0 8px;
}

.example {
  font-size: 13px;
  color: var(--ink-soft);
  border-top: 1px dashed var(--border);
  padding-top: 12px;
  margin-top: 12px;
  line-height: 1.6;
  text-align: left;
}

.pattern-plate {
  background: linear-gradient(135deg, var(--indigo), #6366F1);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 26px 18px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}

.pattern-plate .pattern {
  font-size: 26px;
  font-weight: 800;
}

.pattern-plate .meaning-hint {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 8px;
  font-weight: 500;
}

.repeat-meaning {
  font-size: 15px;
  font-weight: 700;
  color: #fffdf8;
  background: rgba(255, 255, 255, 0.18);
  display: inline-block;
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  margin-top: 10px;
}

.scene-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.22);
  padding: 4px 11px;
  border-radius: var(--radius-pill);
  margin-bottom: 10px;
}

.connection-note {
  background: var(--gold-soft);
  border-left: 4px solid var(--gold);
  padding: 11px 13px;
  font-size: 13px;
  text-align: left;
  margin-bottom: 10px;
  border-radius: var(--radius-sm);
}

.korean-contrast {
  background: var(--vermillion-soft);
  border-left: 4px solid var(--vermillion);
  padding: 11px 13px;
  font-size: 13px;
  text-align: left;
  line-height: 1.6;
  margin-top: 12px;
  border-radius: var(--radius-sm);
}

.deck-switch {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  background: var(--surface-alt);
  padding: 5px;
  border-radius: var(--radius-pill);
}

.deck-switch button {
  flex: 1;
  padding: 10px 4px;
  border: none;
  background: transparent;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: var(--radius-pill);
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
}

.deck-switch button.active {
  background: var(--surface);
  color: var(--indigo);
  box-shadow: var(--shadow-sm);
}

.option-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 14px;
}

.option-btn {
  padding: 13px 16px;
  border: none;
  border-radius: var(--radius);
  background: var(--surface-alt);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 600;
  font-size: 14px;
  text-align: left;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 3px 0 rgba(79, 70, 229, 0.12);
  transition: transform 0.08s, box-shadow 0.08s;
}

.option-btn:not(:disabled):active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 rgba(79, 70, 229, 0.12);
}

.option-btn:disabled {
  cursor: default;
}

.option-correct {
  background: var(--moss);
  color: #fff;
  box-shadow: 0 3px 0 var(--moss-dark);
}

.option-wrong {
  background: var(--vermillion);
  color: #fff;
  box-shadow: 0 3px 0 var(--vermillion-dark);
}

.feedback {
  margin-top: 10px;
  font-weight: 800;
  font-size: 15px;
  font-family: 'Baloo 2', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
}

.feedback-correct { color: var(--moss-dark); }
.feedback-wrong { color: var(--vermillion-dark); }

.level-picker {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.level-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 17px 20px;
  border: none;
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}

.level-btn:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.level-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.level-btn-label {
  font-family: 'Baloo 2', 'Noto Sans KR', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--indigo);
}

.level-btn-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
}

.change-level-link {
  display: block;
  background: none;
  border: none;
  font-size: 12px;
  font-weight: 600;
  color: var(--indigo);
  cursor: pointer;
  padding: 0 2px 6px;
}

.focus-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--surface-alt);
  border: none;
  border-radius: var(--radius-pill);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  color: var(--indigo);
  cursor: pointer;
  margin-bottom: 8px;
}

.sentence-answer-row {
  min-height: 56px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  align-items: center;
  background: var(--surface-alt);
}

.sentence-placeholder {
  font-size: 12px;
  color: var(--ink-soft);
}

.sentence-pool-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 4px;
}

.tile-btn {
  padding: 11px 15px;
  border: none;
  border-radius: var(--radius);
  background: var(--purple-soft);
  color: var(--purple);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 3px 0 rgba(165, 96, 245, 0.25);
  transition: transform 0.08s, box-shadow 0.08s;
}

.tile-btn:not(:disabled):active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 rgba(165, 96, 245, 0.25);
}

.tile-btn.placed {
  background: var(--purple);
  color: #fff;
  box-shadow: 0 3px 0 #7c3fd4;
}

.tile-btn.tile-correct {
  background: var(--moss);
  color: #fff;
  box-shadow: 0 3px 0 var(--moss-dark);
}

.tile-btn.tile-wrong {
  background: var(--vermillion);
  color: #fff;
  box-shadow: 0 3px 0 var(--vermillion-dark);
}

.tile-btn:disabled {
  cursor: default;
}

.tile-btn ruby {
  ruby-position: over;
}

.tile-btn rt {
  font-size: 10px;
  color: inherit;
  opacity: 0.8;
  font-weight: 500;
}

.mic-btn {
  width: 48px !important;
  height: 48px;
  flex: 0 0 48px !important;
  border-radius: 50%;
  border: none;
  background: var(--indigo-soft);
  color: var(--indigo);
  font-size: 19px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
}

.mic-btn.recording {
  background: var(--vermillion);
  color: #fff;
  animation: mic-pulse 1s infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.4); }
  50% { box-shadow: 0 0 0 10px rgba(255, 75, 75, 0); }
}

.chat-recording {
  opacity: 0.8;
  font-style: italic;
}

.chat-window {
  height: 380px;
  overflow-y: auto;
  border-radius: var(--radius-lg);
  background: var(--surface-alt);
  border: none;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-bubble {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: 20px;
  font-size: 14px;
  line-height: 1.55;
  position: relative;
  box-shadow: var(--shadow-sm);
  animation: chat-pop-in 0.18s ease-out;
}

@keyframes chat-pop-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--indigo), #6366F1);
  color: #fff;
  border-bottom-right-radius: 6px;
}

.chat-ai {
  align-self: flex-start;
  background: var(--surface);
  border: none;
  color: var(--ink);
  border-bottom-left-radius: 6px;
}

.retry-badge {
  display: inline-block;
  padding: 7px 14px;
  margin-bottom: 12px;
  background: var(--gold-soft);
  border: none;
  border-radius: var(--radius-pill);
  color: var(--gold-dark);
  font-size: 12px;
  font-weight: 700;
}

.chat-loading {
  font-weight: 700;
  color: var(--ink-soft);
}

.chat-translation {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-size: 13px;
  color: var(--ink-soft);
}

.chat-correction {
  margin-top: 8px;
  padding: 9px 12px;
  background: var(--gold-soft);
  border-left: 4px solid var(--gold);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--ink);
}

.chat-bubble-actions {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}

.chat-replay {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
  padding: 0;
}

.chat-translate-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  color: var(--indigo);
  padding: 0;
}

.chat-user .chat-translate-btn {
  color: #fff;
  text-decoration: underline;
}

.chat-user .chat-translation {
  border-top-color: rgba(255, 255, 255, 0.3);
  color: rgba(255, 255, 255, 0.85);
}

.stt-lang-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}

.stt-lang-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
}

.stt-lang-btn {
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  border: none;
  background: var(--surface-alt);
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}

.stt-lang-btn.active {
  background: var(--indigo);
  color: #fff;
}

.stt-lang-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  width: 100%;
}

.chat-input {
  flex: 1 1 0% !important;
  min-width: 0;
  width: auto !important;
  margin-bottom: 0 !important;
}

.chat-send-btn {
  flex: 0 0 auto !important;
  width: auto !important;
  padding: 14px 20px;
  margin-top: 0;
  white-space: nowrap;
}

.action-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.action-row .primary-btn,
.action-row .secondary-btn {
  flex: 1;
  margin-top: 0;
}

.quiz-sticky-actions {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  max-width: 640px;
  margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -6px 20px rgba(31, 37, 51, 0.08);
  z-index: 40;
}

.quiz-sticky-spacer {
  height: 88px;
}

.primary-btn {
  width: 100%;
  padding: 16px;
  background: var(--indigo);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Baloo 2', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--indigo-dark);
  transition: transform 0.08s, box-shadow 0.08s;
}

.primary-btn:not(:disabled):active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--indigo-dark);
}

.primary-btn:disabled {
  opacity: 0.4;
  box-shadow: none;
}

.secondary-btn {
  padding: 16px 8px;
  border: 2px solid var(--indigo-soft);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--indigo);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
}

.secondary-btn.active {
  background: var(--gold-soft);
  border-color: var(--gold);
  color: var(--gold-dark);
}

.replay-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  background: var(--surface-alt);
  border: none;
  border-radius: var(--radius);
  color: var(--indigo);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}

.quick-actions-row {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.quick-actions-row .review-bar,
.quick-actions-row .ai-chat-bar {
  flex: 1;
  width: auto;
  margin-bottom: 0;
  padding: 12px 6px;
  font-size: 12px;
}

.review-bar {
  display: block;
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  border-radius: var(--radius);
  background: var(--gold);
  color: #fff;
  font-family: 'Baloo 2', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--gold-dark);
  transition: transform 0.08s, box-shadow 0.08s;
}

.review-bar:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--gold-dark);
}

.review-bar.active {

const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ==================== AI 회화 연습 - Cloudflare Worker(Gemini 프록시) 주소 ====================
// Worker 배포 후 여기에 본인 Worker 주소를 넣으세요. 비워두면 "AI 회화" 화면에 안내 문구가 뜹니다.
const AI_WORKER_URL = 'https://ancient-mouse-c47study-app.osp2ow.workers.dev/';

// Gemini TTS는 원시 PCM 오디오를 base64로 돌려주므로, 브라우저에서 재생 가능하도록
// WAV 헤더를 씌워준다. (24kHz, mono, 16bit 가정 - Gemini TTS 기본 출력 포맷)
function pcmBase64ToWavBlob(base64, sampleRate, numChannels, bitsPerSample) {
  sampleRate = sampleRate || 24000;
  numChannels = numChannels || 1;
  bitsPerSample = bitsPerSample || 16;

  const binary = atob(base64);
  const len = binary.length;
  const buffer = new ArrayBuffer(44 + len);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
  const blockAlign = (numChannels * bitsPerSample) / 8;

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + len, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(36, 'data');
  view.setUint32(40, len, true);

  const bytes = new Uint8Array(buffer, 44);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

  return new Blob([buffer], { type: 'audio/wav' });
}

let currentAiAudio = null;

// AI 회화 답변을 Gemini 음성으로 읽어준다. 실패(할당량 초과 등)하면 조용히 브라우저 음성으로 대체.
async function speakWithGemini(text, fallbackSpeak) {
  if (!text || !AI_WORKER_URL) {
    fallbackSpeak(text);
    return;
  }
  if (currentAiAudio) {
    currentAiAudio.pause();
    currentAiAudio = null;
  }
  try {
    const res = await fetch(AI_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'tts', text }),
    });
    const data = await res.json();
    if (!data.audioBase64) {
      console.warn('[Gemini TTS] 오디오 없음, 브라우저 음성으로 대체:', data.error || data);
      fallbackSpeak(text);
      return;
    }
    const blob = pcmBase64ToWavBlob(data.audioBase64, 24000, 1, 16);
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAiAudio = audio;
    audio.onerror = (e) => {
      console.warn('[Gemini TTS] 오디오 재생 실패, 브라우저 음성으로 대체:', e);
      fallbackSpeak(text);
    };
    await audio.play().catch((err) => {
      console.warn('[Gemini TTS] play() 실패, 브라우저 음성으로 대체:', err);
      fallbackSpeak(text);
    });
  } catch (e) {
    console.warn('[Gemini TTS] 요청 실패, 브라우저 음성으로 대체:', e);
    fallbackSpeak(text);
  }
}

// ==================== SM-2 SRS 알고리즘 ====================
const RATING = { AGAIN: 0, HARD: 3, GOOD: 4, EASY: 5 };
const DAY_MS = 24 * 60 * 60 * 1000;

function scheduleNext(prev, quality) {
  prev = prev || {};
  let repetition = prev.repetition !== undefined ? prev.repetition : 0;
  let easeFactor = prev.easeFactor !== undefined ? prev.easeFactor : 2.5;
  let interval = prev.interval !== undefined ? prev.interval : 0;
  if (quality < 3) {
    repetition = 0;
    interval = 0;
  } else {
    if (repetition === 0) interval = 1;
    else if (repetition === 1) interval = 6;
    else interval = Math.round(interval * easeFactor);
    repetition += 1;
  }
  easeFactor = Math.max(1.3, easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  const now = Date.now();
  const nextReview = quality < 3
    ? new Date(now + 10 * 60 * 1000).toISOString()
    : new Date(now + interval * DAY_MS).toISOString();
  return {
    repetition,
    easeFactor: Number(easeFactor.toFixed(2)),
    interval,
    nextReview,
    lastReviewed: new Date(now).toISOString(),
  };
}
function getStatus(srs) {
  if (!srs || srs.repetition === undefined) return 'new';
  if (srs.repetition >= 5 && srs.interval >= 21) return 'mastered';
  if (new Date(srs.nextReview) <= new Date()) return 'due';
  return 'learning';
}
function isDue(srs) {
  if (!srs || !srs.nextReview) return true;
  return new Date(srs.nextReview) <= new Date();
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;

}
function buildOptions(correctItem, pool, getAnswer, count) {
  count = count || 4;
  const correctText = getAnswer(correctItem);

  pool.forEach((i) => {

    const t = getAnswer(i);
    if (!t || t === correctText || seen.has(t)) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  const ctx = getAudioCtx();

// 문법 패턴(예: "~아요/어요", "~이/가")을 TTS로 읽을 때 "~"나 "/" 기호 때문에
// 아예 안 읽히거나 이상하게 읽히는 문제가 있어서, 기호를 제거하고 각 형태를 쉼표로 끊어 읽게 함
function cleanPatternForSpeech(pattern) {
  return (pattern || '')
    .replace(/~/g, '')
    .split('/')
    .map((p) => p.trim())
    .filter(Boolean)
    .join(', ');
}

function useUserStats(user) {
  const [stats, setStats] = useState({ xp: 0, streak: 0, lastStudyDate: null, preferredMode: null });
  const uid = user ? user.uid : null;

  useEffect(() => {
    if (!uid) { setStats({ xp: 0, streak: 0, lastStudyDate: null, preferredMode: null }); return; }
    const ref = db.collection('users').doc(uid);
    const unsub = ref.onSnapshot(
      (snap) => {
        const data = snap.data() || {};
        setStats({
          xp: data.xp || 0,
          streak: data.streak || 0,
          lastStudyDate: data.lastStudyDate || null,
          preferredMode: data.preferredMode || null,
        });
      },
      (err) => console.error('유저 통계 구독 오류:', err.code, err.message)
    );
    return () => unsub();
  }, [uid]);

  const recordActivity = useCallback((correct) => {
    if (!uid) return;
    const ref = db.collection('users').doc(uid);
    const todayStr = new Date().toISOString().slice(0, 10);
    setStats((prev) => {
      let nextStreak = prev.streak || 0;
      if (prev.lastStudyDate !== todayStr) {
        const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        nextStreak = prev.lastStudyDate === yesterdayStr ? nextStreak + 1 : 1;
      }
      const nextXp = (prev.xp || 0) + (correct ? 10 : 2);
      const next = { ...prev, xp: nextXp, streak: nextStreak, lastStudyDate: todayStr };
      ref.set({ xp: nextXp, streak: nextStreak, lastStudyDate: todayStr }, { merge: true });
      return next;
    });
  }, [uid]);

  const setPreferredMode = useCallback((m) => {
    if (!uid) return;
    setStats((prev) => ({ ...prev, preferredMode: m }));
    db.collection('users').doc(uid).set({ preferredMode: m }, { merge: true });
  }, [uid]);

  return { xp: stats.xp, streak: stats.streak, preferredMode: stats.preferredMode, recordActivity, setPreferredMode };
}

// ==================== 실제 Firestore 연동 SRS 훅 (모든 덱 공용) ====================
function useSrsDeck(user, deckType, firestoreName, masterList, retryKey) {
  const [progress, setProgress] = useState({});
  const [loading, setLoading] = useState(true);
  const [seeded, setSeeded] = useState(false);
  const [error, setError] = useState(null);
  const uid = user ? user.uid : null;

  useEffect(() => { setSeeded(false); }, [firestoreName]);

  useEffect(() => {
    if (!uid) { setProgress({}); setLoading(false); return; }
    setLoading(true);
    setError(null);
    const colRef = db.collection('users').doc(uid).collection(firestoreName);
    const unsub = colRef.onSnapshot(
      (snapshot) => {
        const p = {};
        snapshot.forEach((docSnap) => { p[docSnap.id] = docSnap.data(); });
        setProgress(p);
        setLoading(false);
      },
      (err) => {
        console.error('[' + firestoreName + '] Firestore 오류:', err.code, err.message);
        setError(err);
        setLoading(false);
      }
    );
    return () => unsub();
  }, [uid, firestoreName, retryKey]);

  useEffect(() => {
    if (!uid || loading || seeded || error) return;
    const existingIds = new Set(Object.keys(progress));
    const missing = masterList.filter((item) => !existingIds.has(item.id));
    if (missing.length === 0) { setSeeded(true); return; }
    const batch = db.batch();
    const colRef = db.collection('users').doc(uid).collection(firestoreName);
    missing.forEach((item) => {
      batch.set(colRef.doc(item.id), {
        repetition: 0,
        easeFactor: 2.5,
        interval: 0,
        nextReview: new Date().toISOString(),
        lastReviewed: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    batch.commit().then(() => setSeeded(true));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [uid, firestoreName, loading, seeded, error]);

  const items = useMemo(() => masterList.map((item) => {
    const srs = progress[item.id];
    return { ...item, srs, status: getStatus(srs), due: isDue(srs), sourceDeck: deckType };
  }), [progress, masterList, deckType]);

  const dueItems = useMemo(() => items.filter((i) => i.due), [items]);

  const submitReview = useCallback((itemId, quality) => {
    if (!uid) return;
    const current = progress[itemId];
    const next = scheduleNext(current, quality);
    setProgress((prev) => ({ ...prev, [itemId]: { ...current, ...next } }));
    db.collection('users').doc(uid).collection(firestoreName).doc(itemId).set(
      { ...next, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
  }, [uid, firestoreName, progress]);

  const toggleBookmark = useCallback((itemId, nextValue) => {
    if (!uid) return;
    const current = progress[itemId];
    const value = nextValue !== undefined ? nextValue : !(current && current.bookmarked);
    setProgress((prev) => ({ ...prev, [itemId]: { ...prev[itemId], bookmarked: value } }));
    db.collection('users').doc(uid).collection(firestoreName).doc(itemId).set(
      { bookmarked: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
  }, [uid, firestoreName, progress]);

  const bookmarkedItems = useMemo(() => items.filter((i) => i.srs && i.srs.bookmarked), [items]);

  const stats = useMemo(() => {
    const total = items.length;
    const due = dueItems.length;
    const mastered = items.filter((i) => i.status === 'mastered').length;
    return { total, due, mastered };
  }, [items, dueItems]);

  return { items, dueItems, bookmarkedItems, loading, error, submitReview, toggleBookmark, stats };
}

function JaQuizCard({ item, pool, onResult, onToggleBookmark, isRetry }) {
  const deckType = item.sourceDeck;
  const [selected, setSelected] = useState(null);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));
  const getAnswer = JA_ANSWER_GETTERS[deckType];
  const correctText = useMemo(() => getAnswer(item), [item.id]);
  const options = useMemo(() => buildOptions(item, pool, getAnswer, 4), [item.id]);
  const speechText = useMemo(() => jaSpeechText(deckType, item), [deckType, item]);
  const answered = selected !== null;
  const isCorrect = selected === correctText;

  useEffect(() => cancelSpeech, []);
  useEffect(() => {
    if ((deckType === 'travel' || deckType === 'words') && speechText) {
      const t = setTimeout(() => speakJapanese(speechText), 500);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function handleSelect(opt) {
    if (answered) return;
    const correct = opt === correctText;
    setSelected(opt);
    if (correct) playCorrectSound(); else playWrongSound();
    const exampleAudio = (deckType === 'words' || deckType === 'grammar') ? (item.exampleReading || item.example) : speechText;
    if (exampleAudio) setTimeout(() => speakJapanese(exampleAudio), correct ? 500 : 900);
  }
  function handleNext() { onResult(item.id, isCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck); }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }
  const inlineWordAudio = deckType === 'words' && speechText ? () => speakJapanese(speechText) : deckType === 'grammar' ? () => speakJapanese(cleanPatternForSpeech(item.pattern)) : null;
  const inlineExampleAudio = (deckType === 'words' || deckType === 'grammar') ? () => speakJapanese(item.exampleReading || item.example || speechText) : null;

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        {jaRenderQuestion(deckType, item, inlineWordAudio)}
        {deckType === 'kanji' && isRetry && !answered && (
          <div className="kanji-hint">💡 힌트: 음독 {item.onyomi} · 훈독 {item.kunyomi}</div>
        )}
        {speechText && !answered && deckType !== 'words' && deckType !== 'grammar' && (
          <button className="replay-btn" onClick={() => speakJapanese(speechText)}>🔊 다시 듣기</button>
        )}
        <div className="option-list">
          {options.map((opt) => {
            let cls = 'option-btn';
            if (answered) { if (opt === correctText) cls += ' option-correct'; else if (opt === selected) cls += ' option-wrong'; }
            return <button key={opt} className={cls} onClick={() => handleSelect(opt)} disabled={answered}>{opt}</button>;
          })}
        </div>
        {answered && (<React.Fragment>
          <div className={'feedback ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong')}>{isCorrect ? '정답입니다!' : ('오답입니다. 정답: ' + correctText)}</div>
          {jaRenderDetail(deckType, item, inlineExampleAudio)}
          {speechText && deckType !== 'words' && deckType !== 'grammar' && (
            <button className="replay-btn" onClick={() => speakJapanese(speechText)}>🔊 다시 듣기</button>
          )}
          <div className="action-row quiz-sticky-actions">
            <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 복습노트에 있음' : '☆ 복습에 추가'}</button>
            <button className="primary-btn" onClick={handleNext}>다음</button>
          </div>
          <div className="quiz-sticky-spacer" />
        </React.Fragment>)}
      </div>
    </div>
  );
}

function JaLevelPicker({ levelCounts, onSelect }) {

        })}

function JaStudySession({ dueItems, pool, submitReview, onToggleBookmark, onFinish, onActivity }) {
  const [queue, setQueue] = useState(dueItems);
  const [correctSet, setCorrectSet] = useState(() => new Set());
  const [wrongSet, setWrongSet] = useState(() => new Set());
  const [attemptSeq, setAttemptSeq] = useState(0); // 같은 문제가 연속으로 다시 나와도 카드가 새로 마운트되도록
  const [totalCount] = useState(() => dueItems.length); // 세션 시작 시점에 고정 - 중간에 due 상태가 바뀌어도 흔들리지 않도록
  if (queue.length === 0) return <div className="empty-state"><p>오늘 학습할 항목이 없습니다 🎉</p><button className="primary-btn" onClick={onFinish}>목록으로</button></div>;
  const current = queue[0];
  const currentKey = current.id + current.sourceDeck;
  const isRetry = wrongSet.has(currentKey) && !correctSet.has(currentKey);
  function handleResult(itemId, quality, sourceDeck) {
    submitReview(itemId, quality, sourceDeck);
    if (onActivity) onActivity(quality >= RATING.HARD);
    const key = itemId + sourceDeck;
    if (quality >= RATING.HARD) setCorrectSet((prev) => new Set(prev).add(key));
    else setWrongSet((prev) => new Set(prev).add(key));
    setQueue((prev) => { const rest = prev.slice(1); if (quality < RATING.HARD) return [...rest, prev[0]]; return rest; });
    setAttemptSeq((s) => s + 1);
  }
  return (
    <div>
      <div className="mono" style={{ marginBottom: 8, fontSize: 12, color: 'var(--ink-soft)' }}>{totalCount} / {correctSet.size}</div>
      {isRetry && <div className="retry-badge">🔄 재도전! 아까 틀렸던 문제예요</div>}
      {current.sourceDeck === 'sentence'
        ? <JaSentenceCard key={current.id + current.sourceDeck + '-' + attemptSeq} item={current} onResult={handleResult} onToggleBookmark={onToggleBookmark} />
        : <JaQuizCard key={current.id + current.sourceDeck + '-' + attemptSeq} item={current} pool={pool} onResult={handleResult} onToggleBookmark={onToggleBookmark} isRetry={isRetry} />}
    </div>
  );
}
function JaSentenceCard({ item, onResult, onToggleBookmark }) {
  const [pool, setPool] = useState(() =>
    shuffle([...item.tiles, ...(item.distractors || [])].map((t, i) => ({ id: i, text: t.text, reading: t.reading })))
      .map((t, idx) => ({ ...t, orderIdx: idx }))
  );
  const [placed, setPlaced] = useState([]);
  const [checked, setChecked] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));

  useEffect(() => cancelSpeech, []);

  function renderTileLabel(t) {
    if (t.reading && t.reading !== t.text) {
      return <ruby>{t.text}<rt>{t.reading}</rt></ruby>;
    }
    return t.text;
  }

  function placeTile(tile) {
    if (checked) return;
    setPool((prev) => prev.filter((t) => t.id !== tile.id));
    setPlaced((prev) => [...prev, tile]);
    speakJapanese(tile.reading || tile.text);
  }
  function removeTile(tile) {
    if (checked) return;
    setPlaced((prev) => prev.filter((t) => t.id !== tile.id));
    // 원래 있던 자리(orderIdx) 기준으로 정렬해서 돌려놓기 - 맨 끝으로 가지 않도록
    setPool((prev) => [...prev, tile].sort((a, b) => a.orderIdx - b.orderIdx));
  }
  const isComplete = placed.length === item.tiles.length;
  const correctTextJoined = item.tiles.map((t) => t.text).join('|');

  function handleCheck() {
    const correct = placed.map((t) => t.text).join('|') === correctTextJoined;
    setChecked(true);
    setWasCorrect(correct);
    if (correct) {
      playCorrectSound();
      setTimeout(() => speakJapanese(item.reading || item.tiles.map((t) => t.text).join('')), 500);
    } else {
      playWrongSound();
    }
  }
  function handleNext() {
    onResult(item.id, wasCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck);
  }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        <div className="pattern-plate">
          <div className="meaning-hint" style={{ fontSize: 12, opacity: 0.85 }}>다음 문장을 일본어로 배열하세요</div>
          <div className="pattern" style={{ fontSize: 18 }}>{item.meaning}</div>
        </div>

        <div className="sentence-answer-row">
          {placed.length === 0 && <span className="sentence-placeholder">아래 조각을 순서대로 눌러 문장을 완성하세요</span>}
          {placed.map((t) => {
            let cls = 'tile-btn placed jp-text';
            if (checked) cls += wasCorrect ? ' tile-correct' : ' tile-wrong';
            return <button key={t.id} className={cls} onClick={() => removeTile(t)} disabled={checked}>{renderTileLabel(t)}</button>;
          })}
        </div>

        <div className="sentence-pool-row">
          {pool.map((t) => (
            <button key={t.id} className="tile-btn jp-text" onClick={() => placeTile(t)} disabled={checked}>{renderTileLabel(t)}</button>
          ))}
        </div>

        {!checked ? (
          <button className="primary-btn" style={{ marginTop: 16 }} disabled={!isComplete} onClick={handleCheck}>확인</button>
        ) : (
          <React.Fragment>
            <div className={'feedback ' + (wasCorrect ? 'feedback-correct' : 'feedback-wrong')}>{wasCorrect ? '정답입니다!' : '오답입니다.'}</div>
            <div className="example">정답: <span className="jp-text">{item.tiles.map((t) => t.text).join('')}</span>{item.reading && (<React.Fragment><br/>({item.reading})</React.Fragment>)}</div>
            <button className="replay-btn" onClick={() => speakJapanese(item.reading || item.tiles.join(''))}>🔊 다시 듣기</button>
            <div className="action-row quiz-sticky-actions">
              <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 복습노트에 있음' : '☆ 복습에 추가'}</button>
              <button className="primary-btn" onClick={handleNext}>다음</button>
            </div>
            <div className="quiz-sticky-spacer" />
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function JaListView({ deckType, items, onRemove }) {
  const SCENES = ['전체', '공항', '식당', '숙소', '길찾기', '쇼핑', '병원', '대중교통', '긴급상황', '비즈니스'];
  const [scene, setScene] = useState('전체');
  const showSceneFilter = deckType === 'travel';
  const filtered = showSceneFilter && scene !== '전체' ? items.filter((i) => i.scene === scene) : items;
  function primary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.word;
    if (dt === 'grammar') return i.pattern;
    if (dt === 'kanji') return i.char;
    if (dt === 'sentence') return i.tiles.map((t) => t.text).join('');
    return i.japanese;
  }
  function secondary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.meaning;
    if (dt === 'grammar') return i.title;
    if (dt === 'kanji') return i.meaning + ' · 한국음 ' + i.koreanSound;
    if (dt === 'sentence') return i.meaning;
    return i.korean;
  }
  if (items.length === 0) {
    return deckType === 'review'
      ? <div className="empty-state">복습노트가 비어 있습니다.<br/>학습 중 "☆ 복습에 추가" 버튼을 누르면 여기에 모입니다.</div>
      : <div className="empty-state">아직 콘텐츠가 없습니다.</div>;
  }
  return (
    <div>
      {showSceneFilter && (<div className="level-tabs">{SCENES.map((s) => (<button key={s} className={scene === s ? 'active' : ''} onClick={() => setScene(s)}>{s}</button>))}</div>)}
      {filtered.length === 0 ? <div className="empty-state">해당 장면의 회화가 없습니다.</div> : (
        <div>
          {filtered.map((i) => (
            <div className="word-row" key={deckType === 'review' ? (i.sourceDeck + '-' + i.id) : i.id}>
              <div className="info">
                <div className="jp">{primary(i)}{deckType === 'review' && <span className="deck-tag" style={{ marginLeft: 6 }}>{JA_DECK_LABELS[i.sourceDeck]}</span>}</div>
                <div className="kr">{secondary(i)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className={'status-badge status-' + i.status}>{STATUS_LABEL[i.status]}</span>
                {deckType === 'review' && <button className="remove-btn" onClick={() => onRemove(i)}>제거</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  ],
  kr: [
    { id: 'free', label: '自由会話', role: null },
    { id: 'cafe', label: 'カフェ', role: 'カフェの店員' },
    { id: 'airport', label: '空港', role: '空港のスタッフ' },
    { id: 'phone', label: '電話', role: '電話の相手' },
    { id: 'friend', label: '友達', role: '親しい友達' },
  ],
};

function buildSystemPrompt(mode, level, scenario) {
  if (mode === 'ja') {
    let p = '당신은 한국인 일본어 학습자와 대화 연습을 하는 친절한 일본어 회화 파트너입니다. ' +
      'JLPT ' + level + ' 수준에 맞는 어휘와 문법만 사용해서 원칙적으로는 일본어로만 대답하세요. ' +
      '단, 사용자가 한국어로 질문하거나(예: "이거 일본어로 뭐예요?", "방금 그 단어 무슨 뜻이에요?", 말이 막혀서 도움을 요청하는 경우 등) 하면, ' +
      '그때는 예외적으로 한국어로 친절하고 명확하게 답변해서 도와주고, 그다음 다시 자연스럽게 일본어 대화로 이어가세요. ' +
      '답변은 1~3문장으로 짧게 하세요.';
    if (scenario && scenario.role) {
      p += ' 지금은 역할극 상황입니다. 당신은 "' + scenario.role + '" 역할을 맡아 자연스럽게 연기해주세요.';
    }
    p += ' 반드시 아래 4줄 형식으로만 답변하고 그 외 다른 텍스트는 절대 쓰지 마세요. ' +
      '각 줄의 언어 지정을 엄격하게 지키세요 - 절대 어기지 마세요:\n' +
      'USER||(사용자가 방금 보낸 문장 전체를 자연스러운 한국어로 번역. 이 줄은 반드시 한국어로만 작성. 일본어 절대 금지)\n' +
      'MAIN||(회화 답변. 보통은 일본어로만 작성. 사용자가 한국어로 도움을 요청한 경우에만 이 부분도 한국어로)\n' +
      'TRANS||(MAIN 내용 전체를 자연스러운 한국어로 번역. 이 줄은 반드시 한국어로만 작성. 일본어 절대 금지. MAIN이 이미 한국어였다면 이 줄은 그 내용을 자연스러운 일본어로 다시 쓰기)\n' +
      'CORRECTION||(사용자 문장에 문법이나 단어 실수가 있었다면 한국어로 짧고 부드럽게 고쳐주기. 딱 한 문장으로, 같은 표현이나 단어를 반복하지 말고 간결하게 쓸 것. 실수가 없었다면 "특별히 고칠 부분 없어요!"라고 한국어로 쓰기. 이 줄은 반드시 한국어로만 작성)\n\n' +
      '예시(사용자가 "私は学生てす"라고 오타 섞인 일본어를 보냈을 때):\n' +
      'USER||저는 학생이에요\n' +
      'MAIN||そうなんですね！何を勉強していますか？\n' +
      'TRANS||그렇군요! 무엇을 공부하고 있어요?\n' +
      'CORRECTION||"てす"는 "です"의 오타예요. "私は学生です"가 맞는 표현이에요!';
    return p;
  }
  let p = 'あなたは日本人の韓国語学習者と会話練習をする親切な韓国語会話パートナーです。' +
    'TOPIK ' + level + 'レベルに合う語彙・文法だけを使って、原則として韓国語だけで答えてください。' +
    'ただし、ユーザーが日本語で質問したり(例:「これ韓国語で何て言いますか」「さっきの単語の意味は?」、言葉に詰まって助けを求める場合など)する時は、' +
    'その時だけ例外的に日本語で親切に分かりやすく答えて助けてあげて、その後また自然に韓国語の会話に戻ってください。' +
    '返答は1〜3文程度で短くしてください。';
  if (scenario && scenario.role) {
    p += ' 今はロールプレイの状況です。あなたは「' + scenario.role + '」の役を自然に演じてください。';
  }
  p += ' 必ず下記の4行の形式だけで答えて、それ以外のテキストは絶対に書かないでください。' +
    '各行の言語指定を厳密に守ってください - 絶対に違反しないこと:\n' +
    'USER||(ユーザーが今送った文全体を自然な日本語に翻訳。この行は必ず日本語のみで書くこと。韓国語は絶対禁止)\n' +
    'MAIN||(会話の返答。通常は韓国語のみで書く。ユーザーが日本語で助けを求めた場合のみ、この部分も日本語で)\n' +
    'TRANS||(MAINの内容全体を自然な日本語に翻訳。この行は必ず日本語のみで書くこと。韓国語は絶対禁止。MAINがすでに日本語だった場合は、その内容を自然な韓国語で書き直すこと)\n' +
    'CORRECTION||(ユーザーの文に文法や単語の間違いがあれば、日本語で短く優しく直してあげる。一文だけで、同じ表現や単語を繰り返さず簡潔に書くこと。間違いがなければ「特に直すところはありません！」と日本語で書く。この行は必ず日本語のみで書くこと)\n\n' +
    '例(ユーザーが「저는 학생 이에요」とスペースミスのある韓国語を送った場合):\n' +
    'USER||私は学生です\n' +
    'MAIN||そうなんですね！何を勉強していますか？\n' +
    'TRANS||そうなんですね！何を勉強していますか？\n' +
    'CORRECTION||「학생 이에요」は「학생이에요」とスペースなしで書くのが正しいです！';
  return p;
}

function parseAiReply(raw) {
  const userMatch = raw.match(/USER\|\|([\s\S]*?)(?=\n?MAIN\|\||$)/);
  const mainMatch = raw.match(/MAIN\|\|([\s\S]*?)(?=\n?TRANS\|\||$)/);
  const transMatch = raw.match(/TRANS\|\|([\s\S]*?)(?=\n?CORRECTION\|\||$)/);
  const correctionMatch = raw.match(/CORRECTION\|\|([\s\S]*)/);
  if (mainMatch) {
    return {
      userTranslation: userMatch ? userMatch[1].trim() : null,
      text: mainMatch[1].trim(),
      translation: transMatch ? transMatch[1].trim() : null,
      correction: correctionMatch ? correctionMatch[1].trim() : null,
    };
  }
  return { userTranslation: null, text: raw.trim(), translation: null, correction: null };
}

function AiChatSection({ mode }) {
  const levels = mode === 'ja' ? ['N5', 'N4', 'N3', 'N2', 'N1'] : ['1급', '2급', '3급', '4급', '5급', '6급'];
  const scenarios = AI_SCENARIOS[mode];
  const [level, setLevel] = useState(levels[0]);
  const [scenarioId, setScenarioId] = useState('free');
  const [messages, setMessages] = useState([]);
  const [shownTranslations, setShownTranslations] = useState(() => new Set());
  const [ttsBusy, setTtsBusy] = useState(false);

  async function playAiVoice(text) {
    setTtsBusy(true);
    try {
      await speakWithGemini(text, speak);
    } finally {
      setTtsBusy(false);
    }
  }
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const speak = mode === 'ja' ? speakJapanese : speakKorean;
  const targetLangCode = mode === 'ja' ? 'ja-JP' : 'ko-KR';
  const nativeLangCode = mode === 'ja' ? 'ko-KR' : 'ja-JP';
  const targetLangLabel = mode === 'ja' ? '日本語' : '한국어';
  const nativeLangLabel = mode === 'ja' ? '한국어' : '日本語';
  const [sttLang, setSttLang] = useState('target'); // 'target' | 'native' - 지금 마이크가 어느 언어를 인식할지
  const scenario = scenarios.find((s) => s.id === scenarioId);

  async function startConversation(scn) {
    if (!AI_WORKER_URL) {
      setMessages([]);
      return;
    }
    setMessages([]);
    setLoading(true);
    try {
      const kickoff = mode === 'ja'
        ? '(지금 대화가 막 시작되었습니다. 사용자 발화는 아직 없습니다. 당신이 먼저 위 상황/역할에 어울리는 자연스러운 인사나 질문으로 대화를 시작하세요. 이번 턴은 USER와 CORRECTION 줄에 그냥 "-"만 쓰세요.)'
        : '（今、会話がちょうど始まりました。ユーザーの発言はまだありません。あなたが先に、上記の状況・役割にふさわしい自然な挨拶や質問で会話を始めてください。今回はUSERとCORRECTIONの行にはただ「-」とだけ書いてください。）';
      const res = await fetch(AI_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemPrompt: buildSystemPrompt(mode, level, scn),
          messages: [{ role: 'user', text: kickoff }],
        }),
      });
      const data = await res.json();
      const rawReply = data.reply || data.error || (mode === 'ja' ? '(응답을 받지 못했습니다)' : '(返信を受け取れませんでした)');
      const parsed = parseAiReply(rawReply);
      setMessages([{ role: 'model', text: parsed.text, translation: parsed.translation, correction: null }]);
      playAiVoice(parsed.text);
    } catch (e) {
      // 조용히 실패 - 빈 채팅 상태로 둠 (사용자가 직접 메시지를 입력해서 시작 가능)
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => {
    startConversation(scenario);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []); // 화면 진입 시 기본 시나리오(자유 대화)로 한 번 시작

  async function sendMessage(overrideText) {
    const text = (overrideText !== undefined ? overrideText : input).trim();
    if (!text || loading) return;
    if (!AI_WORKER_URL) {
      setMessages((prev) => [...prev, { role: 'user', text }, { role: 'model', text: mode === 'ja' ? '⚠️ 아직 AI 서버 주소가 설정되지 않았습니다. AI_WORKER_URL을 채워주세요.' : '⚠️ まだAIサーバーのアドレスが設定されていません。AI_WORKER_URLを入力してください。' }]);
      setInput('');
      return;
    }
    const userMsg = { role: 'user', text };
    const nextMessages = [...messages, userMsg];
    setMessages(nextMessages);
    setInput('');
    setLoading(true);
    try {
      const res = await fetch(AI_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemPrompt: buildSystemPrompt(mode, level, scenario),
          messages: nextMessages.map((m) => ({ role: m.role, text: m.text })),
        }),
      });
      const data = await res.json();
      const rawReply = data.reply || data.error || (mode === 'ja' ? '(응답을 받지 못했습니다)' : '(返信を受け取れませんでした)');
      const parsed = parseAiReply(rawReply);
      setMessages((prev) => {
        const updated = [...prev];
        for (let i = updated.length - 1; i >= 0; i--) {
          if (updated[i].role === 'user' && updated[i].translation === undefined) {
            updated[i] = { ...updated[i], translation: parsed.userTranslation };
            break;
          }
        }
        return [...updated, { role: 'model', text: parsed.text, translation: parsed.translation, correction: parsed.correction }];
      });
      playAiVoice(parsed.text);
    } catch (e) {
      setMessages((prev) => [...prev, { role: 'model', text: mode === 'ja' ? '오류가 발생했습니다. 다시 시도해주세요.' : 'エラーが発生しました。もう一度お試しください。' }]);
    } finally {
      setLoading(false);
    }
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  const [recording, setRecording] = useState(false);
  const recognitionRef = useRef(null);
  const recordingRef = useRef(false);
  const finalTranscriptRef = useRef(''); // 지금까지 확정된 전체 텍스트(세션 재시작을 넘어 계속 유지)
  const baseTranscriptRef = useRef(''); // 이전 인식 세션들에서 확정된 텍스트
  const speechSupported = typeof window !== 'undefined' && !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  // AI 회화 화면을 벗어날 때(다른 덱으로 이동 등) 마이크가 계속 켜진 채로 남아있지 않도록 정리
  useEffect(() => {
    return () => {
      recordingRef.current = false;
      if (recognitionRef.current) {
        recognitionRef.current.onresult = null;
        recognitionRef.current.onend = null;
        recognitionRef.current.onerror = null;
        try { recognitionRef.current.abort(); } catch (e) {}
        recognitionRef.current = null;
      }
    };
  }, []);

  function attachRecognitionHandlers(recognition) {
    recognition.onresult = (event) => {
      // 매번 이번 세션의 전체 결과를 처음부터 다시 계산 - resultIndex 누락/중복 버그 방지
      let sessionFinal = '';
      let interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) sessionFinal += transcript;
        else interim += transcript;
      }
      const combined = (baseTranscriptRef.current + sessionFinal).trim();
      finalTranscriptRef.current = combined;
      setInput((combined + interim).trim());
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      recordingRef.current = false;
      setRecording(false);
    };
    recognition.onend = () => {
      // 브라우저가 일정 시간 후 자동으로 세션을 끊는 경우, 사용자가 아직 멈추지 않았다면
      // 지금까지 확정된 내용을 base에 반영하고 새 세션을 이어서 시작 (긴 문장이 잘리지 않도록)
      if (recordingRef.current) {
        baseTranscriptRef.current = finalTranscriptRef.current;
        try {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          const next = new SR();
          next.lang = recognition.lang;
          next.continuous = true;
          next.interimResults = true;
          attachRecognitionHandlers(next);
          recognitionRef.current = next;
          next.start();
        } catch (e) {}
      }
    };
  }

  function startRecording() {
    if (!speechSupported || recordingRef.current || loading) return;
    // 혹시 이전 세션이 완전히 정리되지 않고 남아있다면 먼저 강제 종료
    if (recognitionRef.current) {
      try {
        recognitionRef.current.onresult = null;
        recognitionRef.current.onend = null;
        recognitionRef.current.onerror = null;
        recognitionRef.current.abort();
      } catch (e) {}
      recognitionRef.current = null;
    }
    finalTranscriptRef.current = '';
    baseTranscriptRef.current = '';
    setInput('');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = sttLang === 'target' ? targetLangCode : nativeLangCode;
    // 말이 잠깐 끊겨도(더듬거려도) 계속 듣고, 사용자가 마이크를 다시 눌러야 전송됨
    recognition.continuous = true;
    recognition.interimResults = true;
    attachRecognitionHandlers(recognition);
    recognitionRef.current = recognition;
    try {
      recognition.start();
      recordingRef.current = true;
      setRecording(true);
    } catch (e) {
      // 이전 세션이 아직 마이크를 놓지 않은 경우 등 - 실패하면 상태를 원위치하고 잠시 후 재시도
      console.warn('[음성인식] 시작 실패, 잠시 후 재시도:', e);
      recordingRef.current = false;
      setRecording(false);
      setTimeout(() => {
        try { recognition.start(); recordingRef.current = true; setRecording(true); } catch (e2) { console.warn('[음성인식] 재시도도 실패:', e2); }
      }, 300);
    }
  }
  function stopRecording() {
    recordingRef.current = false;
    setRecording(false);
    if (recognitionRef.current) {
      // 이후 들어오는 이벤트가 입력창을 다시 채우거나 자동 재시작하지 않도록 핸들러부터 제거
      recognitionRef.current.onresult = null;
      recognitionRef.current.onend = null;
      recognitionRef.current.onerror = null;
      // stop()은 마무리 결과를 기다리며 마이크를 비동기로 늦게 놓아줄 수 있어서,
      // abort()로 즉시 끊어 다음 시작 시도가 충돌하지 않게 함
      try { recognitionRef.current.abort(); } catch (e) {}
      recognitionRef.current = null;
    }
    // 화면에 보이는 input은 '확정된 텍스트 + 아직 확정 안 된 마지막 부분'이 합쳐진 최신 상태.
    // finalTranscriptRef만 쓰면 마지막에 말한 부분이 미확정 상태일 때 화면엔 보여도 전송에서 빠지는 문제가 있었음.
    const text = input.trim();
    setInput('');
    if (text) sendMessage(text);
  }

  return (
    <div>
      <div className="level-tabs">
        {levels.map((lv) => (
          <button key={lv} className={level === lv ? 'active' : ''} onClick={() => setLevel(lv)}>{lv}</button>
        ))}
      </div>
      <div className="level-tabs">
        {scenarios.map((s) => (
          <button
            key={s.id}
            className={scenarioId === s.id ? 'active' : ''}
            onClick={() => {
              setScenarioId(s.id);
              startConversation(s);
            }}
          >
            {s.label}
          </button>
        ))}
      </div>

      {!AI_WORKER_URL && (
        <div className="banner" style={{ marginTop: 0 }}>
          {mode === 'ja'
            ? 'AI 회화는 별도 서버(Cloudflare Worker) 설정이 필요합니다. 설정 전까지는 체험만 가능합니다.'
            : 'AI会話には別途サーバー(Cloudflare Worker)の設定が必要です。設定前は体験のみ可能です。'}
        </div>
      )}

      {!speechSupported && (
        <div className="banner" style={{ marginTop: 0 }}>
          {mode === 'ja'
            ? '이 브라우저는 음성 인식을 지원하지 않아요. 텍스트로 입력해주세요. (Chrome/Edge 권장)'
            : 'このブラウザは音声認識に対応していません。テキストで入力してください。（Chrome/Edge推奨）'}
        </div>
      )}

      <div className="chat-window" ref={scrollRef}>
        {messages.length === 0 && (
          <div className="empty-state" style={{ padding: '30px 16px' }}>
            {mode === 'ja' ? '마이크 버튼을 눌러 말하거나, 메시지를 입력해보세요!' : 'マイクボタンを押して話すか、メッセージを入力してみましょう!'}
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} className={'chat-bubble ' + (m.role === 'user' ? 'chat-user' : 'chat-ai')}>
            <span className="jp-text">{m.text}</span>
            {m.translation && shownTranslations.has(i) && (
              <div className="chat-translation">{m.translation}</div>
            )}
            {m.correction && !/특별히|特に/.test(m.correction) && (
              <div className="chat-correction">✏️ {m.correction}</div>
            )}
            <div className="chat-bubble-actions">
              {m.role === 'model' && (
                <button className="chat-replay" onClick={() => playAiVoice(m.text)} disabled={ttsBusy}>{ttsBusy ? '⏳' : '🔊'}</button>
              )}
              {m.translation && (
                <button
                  className="chat-translate-btn"
                  onClick={() => {
                    setShownTranslations((prev) => {
                      const next = new Set(prev);
                      if (next.has(i)) next.delete(i);
                      else next.add(i);
                      return next;
                    });
                  }}
                >
                  {shownTranslations.has(i) ? (mode === 'ja' ? '번역 숨기기' : '訳を隠す') : (mode === 'ja' ? '🔤 번역' : '🔤 訳')}
                </button>
              )}
            </div>
          </div>
        ))}
        {loading && <div className="chat-bubble chat-ai chat-loading">···</div>}
        {recording && (
          <div className="chat-bubble chat-user chat-recording">
            🎙️ {mode === 'ja' ? '듣고 있어요... (다 말하면 마이크를 다시 눌러 전송)' : '聞いています...(話し終わったらもう一度マイクを押して送信)'}
          </div>
        )}
      </div>

      {speechSupported && (
        <div className="stt-lang-row">
          <span className="stt-lang-label">{mode === 'ja' ? '🎤 인식 언어:' : '🎤 認識言語:'}</span>
          <button
            className={'stt-lang-btn' + (sttLang === 'target' ? ' active' : '')}
            onClick={() => setSttLang('target')}
            disabled={recording}
          >
            {targetLangLabel}
          </button>
          <button
            className={'stt-lang-btn' + (sttLang === 'native' ? ' active' : '')}
            onClick={() => setSttLang('native')}
            disabled={recording}
          >
            {nativeLangLabel}
          </button>
        </div>
      )}

      <div className="chat-input-row">
        {speechSupported && (
          <button
            className={'mic-btn' + (recording ? ' recording' : '')}
            onClick={recording ? stopRecording : startRecording}
            disabled={loading}
            title={(mode === 'ja' ? '마이크로 말하기 - ' : 'マイクで話す - ') + (sttLang === 'target' ? targetLangLabel : nativeLangLabel)}
          >
            {recording ? '⏹️' : '🎤'}
          </button>
        )}
        <input
          className="login-input chat-input"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder={mode === 'ja' ? '메시지 입력 또는 마이크로 말하기...' : 'メッセージ入力またはマイクで話す...'}
        />
        <button className="primary-btn chat-send-btn" onClick={() => sendMessage()} disabled={loading}>
          {mode === 'ja' ? '전송' : '送信'}
        </button>
      </div>
    </div>
  );
}

// ==================== 코스(듀오링고 스타일 레벨 경로) ====================

function buildCourseSteps(words, grammars, sentences, kanjiList, travelList, fullWordPool, fullGrammarPool) {
  function pick(arr, n) {
    return shuffle(arr).slice(0, n);
  }
  const w = pick(words, 9);
  const g = pick(grammars, 2);
  const s = pick(sentences, 3);
  const k = pick(kanjiList || [], 2);
  const tv = pick(travelList || [], 2);
  const steps = [];
  if (w[0]) steps.push({ type: 'words', item: w[0] });
  if (w[1]) steps.push({ type: 'words', item: w[1] });
  if (g[0]) steps.push({ type: 'grammar', item: g[0] });
  if (k[0]) steps.push({ type: 'kanji', item: k[0] });
  if (w[2]) steps.push({ type: 'repeat', item: w[2], repeatKind: 'word' });
  if (w[3]) steps.push({ type: 'words', item: w[3] });
  if (tv[0]) steps.push({ type: 'travel', item: tv[0] });

  // 작문 문제 전에, 그 문장에 쓰인 단어/조사들을 미리 가르쳐주는 스텝 + 짝맞추기로 한번 더 확인
  if (s[0]) {
    const resolved0 = resolveTileGlosses(s[0].tiles, fullWordPool, fullGrammarPool);
    if (resolved0.length >= 1) steps.push({ type: 'sentence_preview', sentenceItem: s[0], resolvedTiles: resolved0 });
    if (resolved0.length >= 2) steps.push({ type: 'match', items: resolved0.slice(0, 4).map((t) => ({ word: t.text, meaning: t.meaning })) });
    steps.push({ type: 'sentence', item: s[0] });
  }

  if (g[1]) steps.push({ type: 'grammar', item: g[1] });
  if (k[1]) steps.push({ type: 'kanji', item: k[1] });
  if (w[4]) steps.push({ type: 'repeat', item: w[4], repeatKind: 'word' });
  if (tv[1]) steps.push({ type: 'travel', item: tv[1] });
  const matchItems = [w[5], w[6], w[7], w[8]].filter(Boolean);
  if (matchItems.length >= 3) steps.push({ type: 'match', items: matchItems });

  if (s[1]) {
    const resolved1 = resolveTileGlosses(s[1].tiles, fullWordPool, fullGrammarPool);
    if (resolved1.length >= 1) steps.push({ type: 'sentence_preview', sentenceItem: s[1], resolvedTiles: resolved1 });
    steps.push({ type: 'sentence', item: s[1] });
  }
  if (s[2]) steps.push({ type: 'repeat', item: s[2], repeatKind: 'sentence' });
  const fallbackReviewItems = [w[0], w[1], g[0]].filter(Boolean);
  steps.push({ type: 'review', fallbackItems: fallbackReviewItems });
  return steps;
}

// 레벨 하나(N5 등)의 항목들을 스테이지 개수만큼 골고루 나눠서, 스테이지별로 어느 정도 통일된 소재를 반복 학습하게 함.
// 나중에 stageCount를 늘리거나, 특정 스테이지에 수동으로 주제(예: "공항", "쇼핑")를 지정하고 싶으면
// 이 함수를 교체하거나 STAGE_TOPIC_OVERRIDES 같은 걸 추가해서 확장 가능.
function buildLevelStages(level, allWords, allGrammars, allSentences, allKanji, allTravel, stageCount) {
  const count = stageCount || 10;
  const lw = allWords.filter((w) => w.level === level);
  const lg = allGrammars.filter((g) => g.level === level);
  const ls = allSentences.filter((s) => s.level === level);
  const lk = (allKanji || []).filter((k) => k.level === level);
  const lt = (allTravel || []).filter((t) => t.level === level);
  const stages = [];
  for (let i = 0; i < count; i++) {
    const wChunk = lw.filter((_, idx) => idx % count === i);
    if (wChunk.length === 0) continue;
    const gChunk = lg.length > 0 ? [lg[i % lg.length]] : [];
    const sChunk = ls.length > 0 ? [ls[i % ls.length]] : [];
    const kChunk = lk.length > 0 ? [lk[i % lk.length]] : [];
    const tChunk = lt.length > 0 ? [lt[i % lt.length]] : [];
    stages.push({
      stageId: level + '-' + (i + 1),
      level: level,
      stageNum: i + 1,
      words: wChunk,
      grammar: gChunk,
      sentences: sChunk,
      kanji: kChunk,
      travel: tChunk,
    });
  }
  return stages;
}

// 유저가 마이크로 따라 말한 내용을 목표 텍스트와 대략 비교(완벽한 발음 평가는 아님)
function roughlyMatches(said, target) {
  function norm(s) { return (s || '').replace(/[。、！？.,!?\s]/g, ''); }
  const a = norm(said);
  const b = norm(target);
  if (!a || !b) return false;
  if (a === b) return true;
  const shortLen = Math.max(2, Math.floor(Math.min(a.length, b.length) * 0.6));
  return a.includes(b.slice(0, shortLen)) || b.includes(a.slice(0, shortLen));
}

// 작문 문장의 조각(tile)들을 단어 덱/문법 덱과 대조해서 뜻을 자동으로 찾아줌.
// 새로 데이터를 만들 필요 없이 이미 있는 단어/문법 뜻을 재활용하는 방식.
function resolveTileGlosses(tiles, wordPool, grammarPool) {
  const seen = new Set();
  const out = [];
  (tiles || []).forEach((raw) => {
    // JA는 타일이 {text, reading} 객체, KR은 타일이 그냥 문자열이라 둘 다 지원
    const text = typeof raw === 'string' ? raw : raw.text;
    const reading = typeof raw === 'string' ? null : raw.reading;
    if (!text || seen.has(text)) return;
    const w = (wordPool || []).find((x) => x.word === text);
    if (w) {
      out.push({ text: text, reading: reading, meaning: w.meaning || w.meaningJp });
      seen.add(text);
      return;
    }
    const g = (grammarPool || []).find((x) => {
      const pat = (x.pattern || '').replace(/^~/, '');
      if (pat === text) return true;
      // "이/가", "은/는" 같은 결합형 조사 패턴은 그 중 한쪽 형태(예: "가")만 나와도 매칭되게 함
      return pat.split('/').map((p) => p.trim()).includes(text);
    });
    if (g) {
      out.push({ text: text, reading: reading, meaning: g.meaning });
      seen.add(text);
    }
  });
  return out;
}

function SentenceBreakdownCard({ mode, sentenceItem, resolvedTiles, onNext }) {

  return (
    <div className="genkou-card">

      </div>
      <div className="pattern-plate">

          {fullText}<button className="inline-play-btn inline-play-btn-light" onClick={() => speak(fullReading)}>🔊</button>

            <span className="tile-breakdown-meaning">{t.meaning}</span>
          </div>
        ))}

}

function RepeatCard({ mode, item, repeatKind, onNext }) {
  const speak = mode === 'ja' ? speakJapanese : speakKorean;
  const isSentence = repeatKind === 'sentence';
  const sentenceText = isSentence ? (item.tiles ? item.tiles.map((t) => t.text).join('') : item.word) : null;
  const speakText = isSentence ? (item.reading || sentenceText) : (mode === 'ja' ? (item.reading || item.word) : item.word); // TTS 발음용
  const matchText = isSentence ? sentenceText : item.word; // 음성인식 결과 비교용
  const displayText = isSentence ? sentenceText : item.word;
  const meaningText = isSentence ? item.meaning : (mode === 'ja' ? item.meaning : item.meaningJp);
  const [recording, setRecording] = useState(false);
  const [result, setResult] = useState(null);
  const [heard, setHeard] = useState('');
  const speechSupported = typeof window !== 'undefined' && !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  useEffect(() => {
    const t = setTimeout(() => speak(speakText), 400);
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function startRecording() {
    if (!speechSupported || recording) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.lang = mode === 'ja' ? 'ja-JP' : 'ko-KR';
    r.interimResults = false;
    r.onresult = (e) => {
      const said = e.results[0][0].transcript;
      setHeard(said);
      const correct = roughlyMatches(said, matchText);
      setResult(correct ? 'correct' : 'wrong');
      if (correct) playCorrectSound(); else playWrongSound();
    };
    r.onerror = () => setRecording(false);
    r.onend = () => setRecording(false);
    setRecording(true);
    try { r.start(); } catch (e) { setRecording(false); }
  }

  return (
    <div className="genkou-card">
      <div className="pattern-plate">
        <div className="meaning-hint">
          {isSentence
            ? (mode === 'ja' ? '들리는 문장을 마이크로 따라 말해보세요' : '聞こえてくる文をマイクで繰り返してください')
            : (mode === 'ja' ? '들리는 단어를 마이크로 따라 말해보세요' : '聞こえてくる単語をマイクで繰り返してください')}
        </div>
        <div className="pattern jp-text" style={{ fontSize: isSentence ? 22 : 26 }}>{displayText}</div>
        {meaningText && <div className="repeat-meaning">{meaningText}</div>}
      </div>
      <button className="replay-btn" onClick={() => speak(speakText)}>🔊 {mode === 'ja' ? '다시 듣기' : 'もう一度聞く'}</button>

      {!speechSupported ? (
        <React.Fragment>
          <div className="empty-state" style={{ padding: '14px 0' }}>{mode === 'ja' ? '이 브라우저는 음성인식을 지원하지 않아요. 듣기만 연습해봐도 좋아요! (Chrome 권장)' : 'このブラウザは音声認識に対応していません。聞くだけでも練習になります！（Chrome推奨）'}</div>
          <button className="primary-btn" onClick={onNext}>{mode === 'ja' ? '다음' : '次へ'}</button>
        </React.Fragment>
      ) : !result ? (
        <button
          className={'mic-btn' + (recording ? ' recording' : '')}
          style={{ width: 64, height: 64, fontSize: 26, margin: '18px auto 0' }}
          onClick={startRecording}
          disabled={recording}
        >
          🎤
        </button>
      ) : (
        <React.Fragment>
          <div className={'feedback ' + (result === 'correct' ? 'feedback-correct' : 'feedback-wrong')}>
            {result === 'correct' ? (mode === 'ja' ? '아주 좋아요!' : 'よくできました！') : (mode === 'ja' ? '다시 도전해봐요' : 'もう一度挑戦しましょう')}
          </div>
          <div className="example">{mode === 'ja' ? '내가 말한 내용: ' : 'あなたの発話: '}{heard}</div>
          <div className="action-row">
            <button className="primary-btn" onClick={onNext}>{mode === 'ja' ? '다음' : '次へ'}</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function MatchingCard({ mode, items, onNext }) {
  const pairs = items.slice(0, 5);
  const getMeaning = (i) => i.meaning || i.meaningJp || i.title || i.titleJp;
  const leftItems = useMemo(() => shuffle(pairs.map((p, i) => ({ id: i, text: p.word || p.pattern }))), [items]);
  const rightItems = useMemo(() => shuffle(pairs.map((p, i) => ({ id: i, text: getMeaning(p) }))), [items]);
  const [matchedIds, setMatchedIds] = useState(() => new Set());
  const [selectedLeft, setSelectedLeft] = useState(null);
  const [selectedRight, setSelectedRight] = useState(null);
  const [wrongPair, setWrongPair] = useState(null);

  function checkMatch(l, r) {
    if (l === r) {
      setMatchedIds((prev) => {
        const next = new Set(prev);
        next.add(l);
        if (next.size === pairs.length) setTimeout(onNext, 500);
        return next;
      });
      setSelectedLeft(null);
      setSelectedRight(null);
      playCorrectSound();
    } else {
      setWrongPair({ l, r });
      playWrongSound();
      setTimeout(() => { setWrongPair(null); setSelectedLeft(null); setSelectedRight(null); }, 500);
    }
  }
  function clickLeft(id) {
    if (matchedIds.has(id) || wrongPair) return;
    setSelectedLeft(id);
    if (selectedRight !== null) checkMatch(id, selectedRight);
  }
  function clickRight(id) {
    if (matchedIds.has(id) || wrongPair) return;
    setSelectedRight(id);
    if (selectedLeft !== null) checkMatch(selectedLeft, id);
  }

  return (
    <div className="genkou-card">
      <div className="meaning-hint" style={{ marginBottom: 14 }}>{mode === 'ja' ? '짝을 맞춰보세요' : 'ペアをタップして合わせてください'}</div>
      <div className="matching-grid">
        <div className="matching-col">
          {leftItems.map((l) => (
            <button
              key={'l' + l.id}
              className={'matching-tile' + (matchedIds.has(l.id) ? ' matched' : '') + (selectedLeft === l.id ? ' selected' : '') + (wrongPair && wrongPair.l === l.id ? ' wrong' : '')}
              disabled={matchedIds.has(l.id)}
              onClick={() => clickLeft(l.id)}
            >
              {l.text}
            </button>
          ))}
        </div>
        <div className="matching-col">
          {rightItems.map((r) => (
            <button
              key={'r' + r.id}
              className={'matching-tile' + (matchedIds.has(r.id) ? ' matched' : '') + (selectedRight === r.id ? ' selected' : '') + (wrongPair && wrongPair.r === r.id ? ' wrong' : '')}
              disabled={matchedIds.has(r.id)}
              onClick={() => clickRight(r.id)}
            >
              {r.text}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function ReviewCheckpoint({ mode, items, pool, wasWrongReview, onNext }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const speak = mode === 'ja' ? speakJapanese : speakKorean;

  useEffect(() => {
    if (!items || items.length === 0) onNext();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  if (!items || items.length === 0) return null;

  const item = items[idx];
  const label = item.word || item.pattern || item.char;
  const getMeaning = (i) => i.meaning || i.meaningJp || i.title || i.titleJp;
  const correctMeaning = getMeaning(item);
  // 항목 유형에 따라 읽어줄 발음/예문 텍스트 결정
  const speakText = item.word ? (mode === 'ja' ? (item.reading || item.word) : item.word) : (item.pattern ? cleanPatternForSpeech(item.pattern) : item.char);
  const exampleText = item.exampleReading || item.example || null;

  const options = useMemo(() => {
    const distractors = shuffle((pool || []).filter((i) => i !== item && getMeaning(i) && getMeaning(i) !== correctMeaning))
      .slice(0, 3)
      .map(getMeaning);
    return shuffle([correctMeaning, ...distractors]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  useEffect(() => {
    const t = setTimeout(() => speak(speakText), 400);
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  function handleSelectOption(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt === correctMeaning) playCorrectSound(); else playWrongSound();
    if (exampleText) setTimeout(() => speak(exampleText), opt === correctMeaning ? 500 : 900);
  }

  function next() {
    setSelected(null);
    if (idx + 1 >= items.length) onNext();
    else setIdx(idx + 1);
  }

  return (
    <div className="genkou-card">
      <span className="hanko" style={{ background: wasWrongReview ? 'var(--vermillion)' : 'var(--purple)' }}>
        {wasWrongReview ? (mode === 'ja' ? '오답 복습' : '間違い復習') : (mode === 'ja' ? '복습' : '復習')}
      </span>
      <div style={{ marginTop: 12 }}>
        <div className="meaning-hint" style={{ marginBottom: 10, color: 'var(--ink-soft)' }}>
          {wasWrongReview
            ? (mode === 'ja' ? '아까 틀렸던 문제예요. 다시 한번 풀어볼까요?' : 'さっき間違えた問題です。もう一度解いてみましょう')
            : (mode === 'ja' ? '아까 배운 내용, 기억나세요? 뜻을 골라보세요' : 'さっき習った内容、覚えていますか？意味を選んでください')}
        </div>
        <div className="pattern-plate">
          <div className="pattern jp-text">{label}<button className="inline-play-btn inline-play-btn-light" onClick={() => speak(speakText)}>🔊</button></div>
        </div>
        <div className="option-list">
          {options.map((opt) => {
            let cls = 'option-btn';
            if (selected) {
              if (opt === correctMeaning) cls += ' option-correct';
              else if (opt === selected) cls += ' option-wrong';
            }
            return (
              <button
                key={opt}
                className={cls}
                onClick={() => handleSelectOption(opt)}
                disabled={!!selected}
              >
                {opt}
              </button>
            );
          })}
        </div>
        {selected && (
          <React.Fragment>
            <div className={'feedback ' + (selected === correctMeaning ? 'feedback-correct' : 'feedback-wrong')}>
              {selected === correctMeaning ? (mode === 'ja' ? '정답입니다!' : '正解です！') : (mode === 'ja' ? '정답: ' + correctMeaning : '正解: ' + correctMeaning)}
            </div>
            {item.example && <div className="example">{item.example}{exampleText && <button className="inline-play-btn" onClick={() => speak(exampleText)}>🔊</button>}<br/>{item.exampleMeaning || item.exampleMeaningJp}</div>}
            <button className="primary-btn" style={{ marginTop: 14 }} onClick={next}>{mode === 'ja' ? '다음' : '次へ'}</button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function useCourseProgress(user, mode) {
  const [completed, setCompleted] = useState([]);
  const uid = user ? user.uid : null;
  const fieldKey = 'courseCompleted_' + mode;

  useEffect(() => {
    if (!uid) { setCompleted([]); return; }
    const ref = db.collection('users').doc(uid);
    const unsub = ref.onSnapshot(
      (snap) => {
        const data = snap.data() || {};
        setCompleted(data[fieldKey] || []);
      },
      (err) => console.error('코스 진행상황 구독 오류:', err.code, err.message)
    );
    return () => unsub();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [uid, mode]);

  const markComplete = useCallback((level) => {
    if (!uid) return;
    setCompleted((prev) => {
      if (prev.includes(level)) return prev;
      const next = [...prev, level];
      db.collection('users').doc(uid).set({ [fieldKey]: next }, { merge: true });
      return next;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [uid, mode]);

  return { completed, markComplete };
}

function CourseSession({ mode, level, steps, pool, decks, onFinish, onExit }) {
  const [idx, setIdx] = useState(0);
  const [wrongItems, setWrongItems] = useState([]);
  const step = steps[idx];

  function next() {
    if (idx + 1 >= steps.length) onFinish();
    else setIdx(idx + 1);
  }
  function handleQuizResult(itemId, quality, sourceDeck) {
    if (decks[sourceDeck]) decks[sourceDeck].submitReview(itemId, quality);
    if (quality === RATING.AGAIN && (step.type === 'words' || step.type === 'grammar')) {
      setWrongItems((prev) => (prev.some((w) => w.id === step.item.id) ? prev : [...prev, { ...step.item, sourceDeck: step.type }]));
    }
    next();
  }
  function handleToggleBookmark(item, nextValue) {
    if (decks[item.sourceDeck]) decks[item.sourceDeck].toggleBookmark(item.id, nextValue);
  }

  const progressPct = Math.round((idx / steps.length) * 100);

  return (
    <div>
      <button className="focus-back-btn" onClick={onExit}>← {mode === 'ja' ? '코스에서 나가기' : 'コースから出る'}</button>
      <div className="course-progress-bar"><div className="course-progress-fill" style={{ width: progressPct + '%' }} /></div>

      {(step.type === 'words' || step.type === 'grammar' || step.type === 'kanji' || step.type === 'travel') && (
        mode === 'ja'
          ? <JaQuizCard key={idx} item={{ ...step.item, sourceDeck: step.type }} pool={pool[step.type] || [step.item]} onResult={handleQuizResult} onToggleBookmark={handleToggleBookmark} />
          : <KrQuizCard key={idx} item={{ ...step.item, sourceDeck: step.type }} pool={pool[step.type] || [step.item]} onResult={handleQuizResult} onToggleBookmark={handleToggleBookmark} />
      )}
      {step.type === 'sentence' && (
        mode === 'ja'
          ? <JaSentenceCard key={idx} item={{ ...step.item, sourceDeck: 'sentence' }} onResult={handleQuizResult} onToggleBookmark={handleToggleBookmark} />
          : <KrSentenceCard key={idx} item={{ ...step.item, sourceDeck: 'sentence' }} onResult={handleQuizResult} onToggleBookmark={handleToggleBookmark} />
      )}
      {step.type === 'repeat' && <RepeatCard key={idx} mode={mode} item={step.item} repeatKind={step.repeatKind} onNext={next} />}
      {step.type === 'match' && <MatchingCard key={idx} mode={mode} items={step.items} onNext={next} />}
      {step.type === 'sentence_preview' && <SentenceBreakdownCard key={idx} mode={mode} sentenceItem={step.sentenceItem} resolvedTiles={step.resolvedTiles} onNext={next} />}
      {step.type === 'review' && (
        <ReviewCheckpoint
          key={idx}
          mode={mode}
          items={wrongItems.length > 0 ? wrongItems : step.fallbackItems}
          wasWrongReview={wrongItems.length > 0}
          pool={[...(pool.words || []), ...(pool.grammar || [])]}
          onNext={next}
        />
      )}
    </div>
  );
}

// 레벨 하나(N5 등) 안에서: 코스 단계(가로 스크롤) + 개별 학습(단어/문법/한자/작문 등) 진입
function CourseLevelRow({ mode, level, allStages, completed, onSelectStage }) {
  const [confirmStage, setConfirmStage] = useState(null);
  const stages = allStages.filter((s) => s.level === level);

  function handleClick(st, isLocked) {
    if (isLocked) setConfirmStage(st);
    else onSelectStage(st);
  }

  return (
    <div>
      <div className="course-path-horizontal">
        {stages.map((st) => {
          const globalIdx = allStages.indexOf(st);
          const prevStage = allStages[globalIdx - 1];
          const isDone = completed.includes(st.stageId);
          const isLocked = globalIdx > 0 && prevStage && !completed.includes(prevStage.stageId);
          return (
            <button
              key={st.stageId}
              className={'course-node' + (isDone ? ' done' : '') + (isLocked ? ' locked' : '')}
              onClick={() => handleClick(st, isLocked)}
            >
              <span className="course-node-circle">{isDone ? '⭐' : isLocked ? '🔒' : st.stageNum}</span>
              <span className="course-node-label">{st.stageNum}</span>
            </button>
          );
        })}
      </div>

      {confirmStage && (
        <div className="modal-backdrop" onClick={() => setConfirmStage(null)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <p>{mode === 'ja'
              ? (confirmStage.level + '-' + confirmStage.stageNum + ' 단계는 아직 잠겨있어요. 이전 단계를 안 깼는데, 그래도 시작할까요?')
              : (confirmStage.level + '-' + confirmStage.stageNum + ' はまだロックされています。前の段階をクリアしていませんが、それでも始めますか？')}</p>
            <div className="action-row">
              <button className="secondary-btn" onClick={() => setConfirmStage(null)}>{mode === 'ja' ? '취소' : 'キャンセル'}</button>
              <button className="primary-btn" onClick={() => { onSelectStage(confirmStage); setConfirmStage(null); }}>{mode === 'ja' ? '시작하기' : '始める'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
