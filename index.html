function JaSection({ user, onActivity, onFocusChange }) {
  const [screen, setScreen] = useState('home'); // 'home' | 'level' | 'deck'
  const [homeLevel, setHomeLevel] = useState(null);
  const [deckType, setDeckType] = useState(null); // words|grammar|kanji|travel|sentence|review|ai_chat (screen==='deck'일 때만 의미있음)
  const [selectedLevel, setSelectedLevel] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [studyAll, setStudyAll] = useState(false);
  const [retryKey, setRetryKey] = useState(0);
  const [showRetry, setShowRetry] = useState(false);

  const JA_LEVELS = ['N5', 'N4', 'N3', 'N2', 'N1'];

  const wordDeck = useSrsDeck(user, 'words', 'ja_words', VOCAB_JA, retryKey);
  const grammarDeck = useSrsDeck(user, 'grammar', 'ja_grammar', GRAMMAR_JA, retryKey);
  const kanjiDeck = useSrsDeck(user, 'kanji', 'ja_kanji', KANJI_JA, retryKey);
  const travelDeck = useSrsDeck(user, 'travel', 'ja_travel', TRAVEL_JA, retryKey);
  const sentenceDeck = useSrsDeck(user, 'sentence', 'ja_sentence', SENTENCE_JA, retryKey);
  const decks = { words: wordDeck, grammar: grammarDeck, kanji: kanjiDeck, travel: travelDeck, sentence: sentenceDeck };

  const anyLoading = wordDeck.loading || grammarDeck.loading || kanjiDeck.loading || travelDeck.loading || sentenceDeck.loading;

  useEffect(() => {
    if (!anyLoading) { setShowRetry(false); return; }
    const t = setTimeout(() => setShowRetry(true), 8000);
    return () => clearTimeout(t);
  }, [anyLoading, retryKey]);
  const anyError = wordDeck.error || grammarDeck.error || kanjiDeck.error || travelDeck.error || sentenceDeck.error;

  const bookmarkedItems = useMemo(() => [
    ...wordDeck.bookmarkedItems, ...grammarDeck.bookmarkedItems, ...kanjiDeck.bookmarkedItems, ...travelDeck.bookmarkedItems, ...sentenceDeck.bookmarkedItems,
  ], [wordDeck.bookmarkedItems, grammarDeck.bookmarkedItems, kanjiDeck.bookmarkedItems, travelDeck.bookmarkedItems, sentenceDeck.bookmarkedItems]);

  const isReview = deckType === 'review';
  const isAiChat = deckType === 'ai_chat';
  const activeDeck = (isReview || isAiChat || !deckType) ? null : decks[deckType];
  const unscopedItems = isReview ? bookmarkedItems : (activeDeck ? activeDeck.items : []);
  const needsLevelPick = !selectedLevel && unscopedItems.length > 0;
  const scopedItems = useMemo(() => (!selectedLevel ? unscopedItems : unscopedItems.filter((i) => i.level === selectedLevel)), [unscopedItems, selectedLevel]);
  const scopedDueItems = useMemo(() => (isReview ? scopedItems : scopedItems.filter((i) => i.due)), [isReview, scopedItems]);
  const scopedStats = useMemo(() => ({ total: scopedItems.length, due: scopedDueItems.length, mastered: scopedItems.filter((i) => i.status === 'mastered').length }), [scopedItems, scopedDueItems]);
  const levelCounts = useMemo(() => { const c = {}; unscopedItems.forEach((i) => { c[i.level] = (c[i.level] || 0) + 1; }); return c; }, [unscopedItems]);

  function handleSubmitReview(itemId, quality, sourceDeck) { decks[sourceDeck] && decks[sourceDeck].submitReview(itemId, quality); }
  function handleToggleBookmark(item, nextValue) { decks[item.sourceDeck] && decks[item.sourceDeck].toggleBookmark(item.id, nextValue); }

  // ---- 코스(레벨 안 10단계) ----
  const courseProgress = useCourseProgress(user, 'ja');
  const allStages = useMemo(() => {
    let result = [];
    JA_LEVELS.forEach((lv) => { result = result.concat(buildLevelStages(lv, wordDeck.items, grammarDeck.items, sentenceDeck.items, kanjiDeck.items, travelDeck.items, 10)); });
    return result;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [wordDeck.items.length, grammarDeck.items.length, sentenceDeck.items.length, kanjiDeck.items.length, travelDeck.items.length]);
  const [activeStage, setActiveStage] = useState(null);
  const [courseSteps, setCourseSteps] = useState(null);
  const [justCompletedStage, setJustCompletedStage] = useState(null);

  function startStage(stage) {
    // 문장 조각 뜻 찾기는 레벨 제한 없이 전체 단어/문법에서 검색 (문장과 단어의 레벨 태그가 살짝 어긋나 있어도 뜻을 찾을 수 있도록)
    const fullLevelWords = wordDeck.items;
    const fullLevelGrammar = grammarDeck.items;
    const generated = buildCourseSteps(stage.words, stage.grammar, stage.sentences, stage.kanji, stage.travel, fullLevelWords, fullLevelGrammar);
    if (generated.length === 0) return;
    setCourseSteps(generated);
    setActiveStage(stage);
    setJustCompletedStage(null);
  }
  function finishStage() {
    courseProgress.markComplete(activeStage.stageId);
    setJustCompletedStage(activeStage);
    setCourseSteps(null);
  }
  function exitStageToLevel() {
    setCourseSteps(null);
    setActiveStage(null);
    setJustCompletedStage(null);
  }

  // ---- 내비게이션 ----
  function goHome() { setScreen('home'); setHomeLevel(null); setDeckType(null); exitStageToLevel(); }
  function goLevel(level) { setScreen('level'); setHomeLevel(level); setDeckType(null); exitStageToLevel(); }
  function openDeckAtLevel(deckKey) { setScreen('deck'); setDeckType(deckKey); setSelectedLevel(homeLevel); setTab('dashboard'); setStudyAll(false); }
  function openAiChat() { setScreen('deck'); setDeckType('ai_chat'); }
  function openReview() { setScreen('deck'); setDeckType('review'); setSelectedLevel(null); setTab('dashboard'); setStudyAll(false); }
  function exitDeck() { setDeckType(null); if (homeLevel) setScreen('level'); else setScreen('home'); }

  const isFocused = screen === 'deck' && (tab === 'study' || isAiChat);
  useEffect(() => {
    if (onFocusChange) onFocusChange(isFocused || screen === 'level');
  }, [isFocused, screen]);

  const coursePool = activeStage ? { words: wordDeck.items.filter((i) => i.level === activeStage.level), grammar: grammarDeck.items.filter((i) => i.level === activeStage.level), kanji: kanjiDeck.items.filter((i) => i.level === activeStage.level), travel: travelDeck.items.filter((i) => i.level === activeStage.level) } : { words: [], grammar: [], kanji: [], travel: [] };
  const courseDecks = { words: wordDeck, grammar: grammarDeck, sentence: sentenceDeck, kanji: kanjiDeck, travel: travelDeck };

  if (screen === 'home') {
    return <HomeScreen mode="ja" levels={JA_LEVELS} onSelectLevel={goLevel} onOpenAiChat={openAiChat} onOpenReview={openReview} bookmarkCount={bookmarkedItems.length} />;
  }

  if (screen === 'level') {
    if (courseSteps) {
      return <CourseSession mode="ja" level={activeStage.level + '-' + activeStage.stageNum} steps={courseSteps} pool={coursePool} decks={courseDecks} onFinish={finishStage} onExit={exitStageToLevel} />;
    }
    if (justCompletedStage) {
      return <CourseCompleteScreen mode="ja" level={justCompletedStage.level + '-' + justCompletedStage.stageNum} onBack={() => setJustCompletedStage(null)} />;
    }
    return <LevelHomeScreen mode="ja" level={homeLevel} allStages={allStages} completed={courseProgress.completed} onSelectStage={startStage} onBack={goHome} deckLabels={JA_DECK_LABELS} onOpenDeck={openDeckAtLevel} />;
  }

  // screen === 'deck'
  const topBackLabel = isAiChat
    ? 'AI 회화에서 나가기'
    : tab === 'study'
      ? (JA_DECK_LABELS[deckType] + '에서 나가기')
      : (homeLevel ? homeLevel + '로 돌아가기' : '홈으로');
  function handleTopBack() {
    if (isAiChat) { exitDeck(); return; }
    if (tab === 'study') { setTab('dashboard'); return; }
    exitDeck();
  }

  return (
    <React.Fragment>
      <button className="focus-back-btn" onClick={handleTopBack}>← {topBackLabel}</button>

      {isAiChat ? (
        <AiChatSection mode="ja" />
      ) : anyLoading ? (
        <div className="empty-state">
          학습 데이터 불러오는 중...
          {showRetry && (
            <div style={{ marginTop: 18 }}>
              <p style={{ fontSize: 13, marginBottom: 12 }}>시간이 오래 걸리고 있어요. 네트워크 상태를 확인하고 다시 시도해보세요.</p>
              <button className="primary-btn" onClick={() => { setShowRetry(false); setRetryKey((k) => k + 1); }}>다시 시도</button>
            </div>
          )}
        </div>
      ) : anyError ? (
        <div className="empty-state">데이터를 불러오지 못했습니다.<br/>Firestore 보안 규칙이 게시되어 있는지 확인해주세요.<br/><span className="mono" style={{ fontSize: 11, opacity: 0.7 }}>{anyError.code}</span></div>
      ) : needsLevelPick ? (
        <JaLevelPicker levelCounts={levelCounts} onSelect={(lv) => { setSelectedLevel(lv); setTab('dashboard'); }} />
      ) : (
        <React.Fragment>
          {tab === 'dashboard' && <JaDashboard stats={scopedStats} onStartStudy={(all) => { setStudyAll(!!all); setTab('study'); }} emptyMessage={isReview ? <React.Fragment>복습노트가 비어 있습니다.<br/>학습 중 "☆ 복습에 추가" 버튼을 눌러보세요.</React.Fragment> : undefined} />}
          {tab === 'study' && <JaStudySession dueItems={studyAll ? scopedItems : scopedDueItems} pool={scopedItems} submitReview={handleSubmitReview} onToggleBookmark={handleToggleBookmark} onFinish={() => setTab('dashboard')} onActivity={onActivity} />}
          {tab === 'list' && <JaListView deckType={deckType} items={scopedItems} onRemove={(item) => handleToggleBookmark(item, false)} />}
          <nav className="tab-bar">
            <button className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>홈</button>
            <button className={tab === 'study' ? 'active' : ''} onClick={() => setTab('study')}>학습</button>
            <button className={tab === 'list' ? 'active' : ''} onClick={() => setTab('list')}>목록</button>
          </nav>
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

// ==================== KR 섹션 (한국어 학습, UI 일본어) ====================

const KR_DECK_LABELS = { words: '単語', grammar: '文法', travel: '会話', sentence: '作文' };
const KR_ANSWER_GETTERS = {
  words: (i) => i.meaningJp,
  grammar: (i) => i.meaning,
  travel: (i) => i.japanese,
};
function krSplitChars(text) { return Array.from(text || ''); }
function krSpeechText(deckType, item) {
  if (deckType === 'words') return item.word;
  if (deckType === 'grammar') return item.example;
  if (deckType === 'travel') return item.korean;
  return null;
}
function krRenderQuestion(deckType, item, onPlayWord) {
  if (deckType === 'words') return (
    <React.Fragment>
      <div className="genkou-row">{krSplitChars(item.word).map((ch, i) => (<div className="genkou-cell" key={i}><span className="char">{ch}</span></div>))}</div>
      {onPlayWord && <button className="inline-play-btn" onClick={onPlayWord}>🔊</button>}
    </React.Fragment>
  );
  if (deckType === 'grammar') return (
    <div className="pattern-plate">
      <div className="pattern jp-text">{item.pattern}{onPlayWord && <button className="inline-play-btn inline-play-btn-light" onClick={onPlayWord}>🔊</button>}</div>
    </div>
  );
  return (<div className="pattern-plate">
    <div className="scene-tag">{item.scene}</div>
    <div className="pattern jp-text" style={{ fontSize: 19 }}>{item.korean}</div>
    <div className="meaning-hint">{item.pronunciation}</div>

}
function krRenderDetail(deckType, item, onPlayExample) {
  if (deckType === 'words') return (
    <div className="example">
      {item.example}{onPlayExample && <button className="inline-play-btn" onClick={onPlayExample}>🔊</button>}
      <br/>({item.examplePronunciation})<br/>{item.exampleMeaningJp}
    </div>
  );
  if (deckType === 'grammar') return (<React.Fragment>
    <div className="connection-note"><strong>接続</strong> · {item.connection}</div>
    <div className="example">
      {item.example}{onPlayExample && <button className="inline-play-btn" onClick={onPlayExample}>🔊</button>}
      <br/>{item.exampleMeaningJp}
    </div>
    <div className="korean-contrast"><strong>日本語話者向けノート</strong><br/>{item.japaneseNote}</div>
  </React.Fragment>);
  return <div className="connection-note">{item.note}</div>;
}

function KrQuizCard({ item, pool, onResult, onToggleBookmark }) {
  const deckType = item.sourceDeck;
  const [selected, setSelected] = useState(null);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));
  const getAnswer = KR_ANSWER_GETTERS[deckType];
  const correctText = useMemo(() => getAnswer(item), [item.id]);
  const options = useMemo(() => buildOptions(item, pool, getAnswer, 4), [item.id]);
  const speechText = useMemo(() => krSpeechText(deckType, item), [deckType, item]);
  const answered = selected !== null;
  const isCorrect = selected === correctText;

  useEffect(() => cancelSpeech, []);
  useEffect(() => {
    if ((deckType === 'travel' || deckType === 'words') && speechText) {
      const t = setTimeout(() => speakKorean(speechText), 500);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function handleSelect(opt) {
    if (answered) return;
    const correct = opt === correctText;
    setSelected(opt);
    if (correct) playCorrectSound(); else playWrongSound();
    const exampleAudio = (deckType === 'words' || deckType === 'grammar') ? item.example : speechText;
    if (exampleAudio) setTimeout(() => speakKorean(exampleAudio), correct ? 500 : 900);
  }
  function handleNext() { onResult(item.id, isCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck); }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }
  const inlineWordAudio = deckType === 'words' && speechText ? () => speakKorean(speechText) : deckType === 'grammar' ? () => speakKorean(cleanPatternForSpeech(item.pattern)) : null;
  const inlineExampleAudio = (deckType === 'words' || deckType === 'grammar') ? () => speakKorean(item.example || speechText) : null;

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        {krRenderQuestion(deckType, item, inlineWordAudio)}
        {speechText && !answered && deckType !== 'words' && deckType !== 'grammar' && (
          <button className="replay-btn" onClick={() => speakKorean(speechText)}>🔊 もう一度聞く</button>
        )}
        <div className="option-list">
          {options.map((opt) => {
            let cls = 'option-btn';
            if (answered) { if (opt === correctText) cls += ' option-correct'; else if (opt === selected) cls += ' option-wrong'; }
            return <button key={opt} className={cls} onClick={() => handleSelect(opt)} disabled={answered}>{opt}</button>;
          })}
        </div>
        {answered && (<React.Fragment>
          <div className={'feedback ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong')}>{isCorrect ? '正解です!' : ('不正解です。正解: ' + correctText)}</div>
          {krRenderDetail(deckType, item, inlineExampleAudio)}
          {speechText && deckType !== 'words' && deckType !== 'grammar' && (
            <button className="replay-btn" onClick={() => speakKorean(speechText)}>🔊 もう一度聞く</button>
          )}
          <div className="action-row quiz-sticky-actions">
            <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 復習ノートに追加済み' : '☆ 復習に追加'}</button>
            <button className="primary-btn" onClick={handleNext}>次へ</button>
          </div>
          <div className="quiz-sticky-spacer" />
        </React.Fragment>)}

function KrLevelPicker({ levelCounts, onSelect }) {

        })}

function KrStudySession({ dueItems, pool, submitReview, onToggleBookmark, onFinish, onActivity }) {
  const [queue, setQueue] = useState(dueItems);
  const [correctSet, setCorrectSet] = useState(() => new Set());
  const [wrongSet, setWrongSet] = useState(() => new Set());
  const [attemptSeq, setAttemptSeq] = useState(0); // 같은 문제가 연속으로 다시 나와도 카드가 새로 마운트되도록
  const [totalCount] = useState(() => dueItems.length); // 세션 시작 시점에 고정 - 중간에 due 상태가 바뀌어도 흔들리지 않도록
  if (queue.length === 0) return <div className="empty-state"><p>今日学習する項目がありません 🎉</p><button className="primary-btn" onClick={onFinish}>リストへ</button></div>;
  const current = queue[0];
  const currentKey = current.id + current.sourceDeck;
  const isRetry = wrongSet.has(currentKey) && !correctSet.has(currentKey);
  function handleResult(itemId, quality, sourceDeck) {
    submitReview(itemId, quality, sourceDeck);
    if (onActivity) onActivity(quality >= RATING.HARD);
    const key = itemId + sourceDeck;
    if (quality >= RATING.HARD) setCorrectSet((prev) => new Set(prev).add(key));
    else setWrongSet((prev) => new Set(prev).add(key));
    setQueue((prev) => { const rest = prev.slice(1); if (quality < RATING.HARD) return [...rest, prev[0]]; return rest; });
    setAttemptSeq((s) => s + 1);
  }
  return (
    <div>
      <div className="mono" style={{ marginBottom: 8, fontSize: 12, color: 'var(--ink-soft)' }}>{totalCount} / {correctSet.size}</div>
      {isRetry && <div className="retry-badge">🔄 リトライ！さっき間違えた問題です</div>}
      {current.sourceDeck === 'sentence'
        ? <KrSentenceCard key={current.id + current.sourceDeck + '-' + attemptSeq} item={current} onResult={handleResult} onToggleBookmark={onToggleBookmark} />
        : <KrQuizCard key={current.id + current.sourceDeck + '-' + attemptSeq} item={current} pool={pool} onResult={handleResult} onToggleBookmark={onToggleBookmark} />}
    </div>
  );
}
function KrSentenceCard({ item, onResult, onToggleBookmark }) {
  const [pool, setPool] = useState(() =>
    shuffle([...item.tiles, ...(item.distractors || [])].map((t, i) => ({ id: i, text: t })))
      .map((t, idx) => ({ ...t, orderIdx: idx }))
  );
  const [placed, setPlaced] = useState([]);
  const [checked, setChecked] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));

  useEffect(() => cancelSpeech, []);

  function placeTile(tile) {
    if (checked) return;
    setPool((prev) => prev.filter((t) => t.id !== tile.id));
    setPlaced((prev) => [...prev, tile]);
    speakKorean(tile.text);
  }
  function removeTile(tile) {
    if (checked) return;
    setPlaced((prev) => prev.filter((t) => t.id !== tile.id));
    setPool((prev) => [...prev, tile].sort((a, b) => a.orderIdx - b.orderIdx));
  }
  const isComplete = placed.length === item.tiles.length;

  function handleCheck() {
    const correct = placed.map((t) => t.text).join('|') === item.tiles.join('|');
    setChecked(true);
    setWasCorrect(correct);
    if (correct) {
      playCorrectSound();
      setTimeout(() => speakKorean(item.reading || item.tiles.join(' ')), 500);
    } else {
      playWrongSound();
    }
  }
  function handleNext() {
    onResult(item.id, wasCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck);
  }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        <div className="pattern-plate">
          <div className="meaning-hint" style={{ fontSize: 12, opacity: 0.85 }}>次の文を韓国語で並べ替えてください</div>
          <div className="pattern" style={{ fontSize: 18 }}>{item.meaning}</div>
        </div>

        <div className="sentence-answer-row">
          {placed.length === 0 && <span className="sentence-placeholder">下の断片を順番に押して文を完成させてください</span>}
          {placed.map((t) => {
            let cls = 'tile-btn placed jp-text';
            if (checked) cls += wasCorrect ? ' tile-correct' : ' tile-wrong';
            return <button key={t.id} className={cls} onClick={() => removeTile(t)} disabled={checked}>{t.text}</button>;
          })}
        </div>

        <div className="sentence-pool-row">
          {pool.map((t) => (
            <button key={t.id} className="tile-btn jp-text" onClick={() => placeTile(t)} disabled={checked}>{t.text}</button>
          ))}
        </div>

        {!checked ? (
          <button className="primary-btn" style={{ marginTop: 16 }} disabled={!isComplete} onClick={handleCheck}>確認</button>
        ) : (
          <React.Fragment>
            <div className={'feedback ' + (wasCorrect ? 'feedback-correct' : 'feedback-wrong')}>{wasCorrect ? '正解です!' : '不正解です。'}</div>
            <div className="example">正解: <span className="jp-text">{item.tiles.join(' ')}</span></div>
            <button className="replay-btn" onClick={() => speakKorean(item.reading || item.tiles.join(' '))}>🔊 もう一度聞く</button>
            <div className="action-row quiz-sticky-actions">
              <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 復習ノートに追加済み' : '☆ 復習に追加'}</button>
              <button className="primary-btn" onClick={handleNext}>次へ</button>
            </div>
            <div className="quiz-sticky-spacer" />
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function KrListView({ deckType, items, onRemove }) {
  const SCENES = ['全体', '空港', '食堂', '宿泊先', '道案内', 'ショッピング', '病院', '公共交通', '緊急事態', 'ビジネス'];
  const [scene, setScene] = useState('全体');
  const showSceneFilter = deckType === 'travel';
  const filtered = showSceneFilter && scene !== '全体' ? items.filter((i) => i.scene === scene) : items;
  function primary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.word;
    if (dt === 'grammar') return i.pattern;
    if (dt === 'sentence') return i.tiles.join(' ');
    return i.korean;
  }
  function secondary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.meaningJp;
    if (dt === 'grammar') return i.titleJp;
    if (dt === 'sentence') return i.meaning;
    return i.japanese;
  }
  if (items.length === 0) {
    return deckType === 'review'
      ? <div className="empty-state">復習ノートが空です。<br/>学習中に「☆ 復習に追加」ボタンを押すとここに集まります。</div>
      : <div className="empty-state">まだコンテンツがありません。</div>;
  }
  return (
    <div>
      {showSceneFilter && (<div className="level-tabs">{SCENES.map((s) => (<button key={s} className={scene === s ? 'active' : ''} onClick={() => setScene(s)}>{s}</button>))}</div>)}
      {filtered.length === 0 ? <div className="empty-state">この場面の会話がありません。</div> : (
        <div>
          {filtered.map((i) => (
            <div className="word-row" key={deckType === 'review' ? (i.sourceDeck + '-' + i.id) : i.id}>
              <div className="info">
                <div className="jp">{primary(i)}{deckType === 'review' && <span className="deck-tag" style={{ marginLeft: 6 }}>{KR_DECK_LABELS[i.sourceDeck]}</span>}</div>
                <div className="kr">{secondary(i)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className={'status-badge status-' + i.status}>{STATUS_LABEL[i.status]}</span>
                {deckType === 'review' && <button className="remove-btn" onClick={() => onRemove(i)}>削除</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function KrSection({ user, onActivity, onFocusChange }) {
  const [screen, setScreen] = useState('home'); // 'home' | 'level' | 'deck'
  const [homeLevel, setHomeLevel] = useState(null);
  const [deckType, setDeckType] = useState(null);
  const [selectedLevel, setSelectedLevel] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [studyAll, setStudyAll] = useState(false);
  const [retryKey, setRetryKey] = useState(0);
  const [showRetry, setShowRetry] = useState(false);

  const KR_LEVELS = ['1급', '2급', '3급', '4급', '5급', '6급'];

  const wordDeck = useSrsDeck(user, 'words', 'kr_words', VOCAB_KR, retryKey);
  const grammarDeck = useSrsDeck(user, 'grammar', 'kr_grammar', GRAMMAR_KR, retryKey);
  const travelDeck = useSrsDeck(user, 'travel', 'kr_travel', TRAVEL_KR, retryKey);
  const sentenceDeck = useSrsDeck(user, 'sentence', 'kr_sentence', SENTENCE_KR, retryKey);
  const decks = { words: wordDeck, grammar: grammarDeck, travel: travelDeck, sentence: sentenceDeck };

  const anyLoading = wordDeck.loading || grammarDeck.loading || travelDeck.loading || sentenceDeck.loading;

  useEffect(() => {
    if (!anyLoading) { setShowRetry(false); return; }
    const t = setTimeout(() => setShowRetry(true), 8000);
    return () => clearTimeout(t);
  }, [anyLoading, retryKey]);
  const anyError = wordDeck.error || grammarDeck.error || travelDeck.error || sentenceDeck.error;

  const bookmarkedItems = useMemo(() => [
    ...wordDeck.bookmarkedItems, ...grammarDeck.bookmarkedItems, ...travelDeck.bookmarkedItems, ...sentenceDeck.bookmarkedItems,
  ], [wordDeck.bookmarkedItems, grammarDeck.bookmarkedItems, travelDeck.bookmarkedItems, sentenceDeck.bookmarkedItems]);

  const isReview = deckType === 'review';
  const isAiChat = deckType === 'ai_chat';
  const activeDeck = (isReview || isAiChat || !deckType) ? null : decks[deckType];
  const unscopedItems = isReview ? bookmarkedItems : (activeDeck ? activeDeck.items : []);
  const needsLevelPick = !selectedLevel && unscopedItems.length > 0;
  const scopedItems = useMemo(() => (!selectedLevel ? unscopedItems : unscopedItems.filter((i) => i.level === selectedLevel)), [unscopedItems, selectedLevel]);
  const scopedDueItems = useMemo(() => (isReview ? scopedItems : scopedItems.filter((i) => i.due)), [isReview, scopedItems]);
  const scopedStats = useMemo(() => ({ total: scopedItems.length, due: scopedDueItems.length, mastered: scopedItems.filter((i) => i.status === 'mastered').length }), [scopedItems, scopedDueItems]);
  const levelCounts = useMemo(() => { const c = {}; unscopedItems.forEach((i) => { c[i.level] = (c[i.level] || 0) + 1; }); return c; }, [unscopedItems]);

  function handleSubmitReview(itemId, quality, sourceDeck) { decks[sourceDeck] && decks[sourceDeck].submitReview(itemId, quality); }
  function handleToggleBookmark(item, nextValue) { decks[item.sourceDeck] && decks[item.sourceDeck].toggleBookmark(item.id, nextValue); }

  // ---- 코스(레벨 안 10단계) ----
  const courseProgress = useCourseProgress(user, 'kr');
  const allStages = useMemo(() => {
    let result = [];
    KR_LEVELS.forEach((lv) => { result = result.concat(buildLevelStages(lv, wordDeck.items, grammarDeck.items, sentenceDeck.items, null, travelDeck.items, 10)); });
    return result;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [wordDeck.items.length, grammarDeck.items.length, sentenceDeck.items.length, travelDeck.items.length]);
  const [activeStage, setActiveStage] = useState(null);
  const [courseSteps, setCourseSteps] = useState(null);
  const [justCompletedStage, setJustCompletedStage] = useState(null);

  function startStage(stage) {
    // 문장 조각 뜻 찾기는 레벨 제한 없이 전체 단어/문법에서 검색 (문장과 단어의 레벨 태그가 살짝 어긋나 있어도 뜻을 찾을 수 있도록)
    const fullLevelWords = wordDeck.items;
    const fullLevelGrammar = grammarDeck.items;
    const generated = buildCourseSteps(stage.words, stage.grammar, stage.sentences, null, stage.travel, fullLevelWords, fullLevelGrammar);
    if (generated.length === 0) return;
    setCourseSteps(generated);
    setActiveStage(stage);
    setJustCompletedStage(null);
  }
  function finishStage() {
    courseProgress.markComplete(activeStage.stageId);
    setJustCompletedStage(activeStage);
    setCourseSteps(null);
  }
  function exitStageToLevel() {
    setCourseSteps(null);
    setActiveStage(null);
    setJustCompletedStage(null);
  }

  // ---- 내비게이션 ----
  function goHome() { setScreen('home'); setHomeLevel(null); setDeckType(null); exitStageToLevel(); }
  function goLevel(level) { setScreen('level'); setHomeLevel(level); setDeckType(null); exitStageToLevel(); }
  function openDeckAtLevel(deckKey) { setScreen('deck'); setDeckType(deckKey); setSelectedLevel(homeLevel); setTab('dashboard'); setStudyAll(false); }
  function openAiChat() { setScreen('deck'); setDeckType('ai_chat'); }
  function openReview() { setScreen('deck'); setDeckType('review'); setSelectedLevel(null); setTab('dashboard'); setStudyAll(false); }
  function exitDeck() { setDeckType(null); if (homeLevel) setScreen('level'); else setScreen('home'); }

  const isFocused = screen === 'deck' && (tab === 'study' || isAiChat);
  useEffect(() => {
    if (onFocusChange) onFocusChange(isFocused || screen === 'level');
  }, [isFocused, screen]);

  const coursePool = activeStage ? { words: wordDeck.items.filter((i) => i.level === activeStage.level), grammar: grammarDeck.items.filter((i) => i.level === activeStage.level), travel: travelDeck.items.filter((i) => i.level === activeStage.level) } : { words: [], grammar: [], travel: [] };
  const courseDecks = { words: wordDeck, grammar: grammarDeck, sentence: sentenceDeck, travel: travelDeck };

  if (screen === 'home') {
    return <HomeScreen mode="kr" levels={KR_LEVELS} onSelectLevel={goLevel} onOpenAiChat={openAiChat} onOpenReview={openReview} bookmarkCount={bookmarkedItems.length} />;
  }

  if (screen === 'level') {
    if (courseSteps) {
      return <CourseSession mode="kr" level={activeStage.level + '-' + activeStage.stageNum} steps={courseSteps} pool={coursePool} decks={courseDecks} onFinish={finishStage} onExit={exitStageToLevel} />;
    }
    if (justCompletedStage) {
      return <CourseCompleteScreen mode="kr" level={justCompletedStage.level + '-' + justCompletedStage.stageNum} onBack={() => setJustCompletedStage(null)} />;
    }
    return <LevelHomeScreen mode="kr" level={homeLevel} allStages={allStages} completed={courseProgress.completed} onSelectStage={startStage} onBack={goHome} deckLabels={KR_DECK_LABELS} onOpenDeck={openDeckAtLevel} />;
  }

  // screen === 'deck'
  const topBackLabel = isAiChat
    ? 'AI会話を終了'
    : tab === 'study'
      ? (KR_DECK_LABELS[deckType] + 'を終了')
      : (homeLevel ? homeLevel + 'に戻る' : 'ホームへ');
  function handleTopBack() {
    if (isAiChat) { exitDeck(); return; }
    if (tab === 'study') { setTab('dashboard'); return; }
    exitDeck();
  }

  return (
    <React.Fragment>
      <button className="focus-back-btn" onClick={handleTopBack}>← {topBackLabel}</button>

      {isAiChat ? (
        <AiChatSection mode="kr" />
      ) : anyLoading ? (
        <div className="empty-state">
          学習データを読み込み中...
          {showRetry && (
            <div style={{ marginTop: 18 }}>
              <p style={{ fontSize: 13, marginBottom: 12 }}>時間がかかっています。ネットワーク状態を確認してもう一度お試しください。</p>
              <button className="primary-btn" onClick={() => { setShowRetry(false); setRetryKey((k) => k + 1); }}>再試行</button>
            </div>
          )}
        </div>
      ) : anyError ? (
        <div className="empty-state">データを読み込めませんでした。<br/>Firestoreのセキュリティルールが公開されているか確認してください。<br/><span className="mono" style={{ fontSize: 11, opacity: 0.7 }}>{anyError.code}</span></div>
      ) : needsLevelPick ? (
        <KrLevelPicker levelCounts={levelCounts} onSelect={(lv) => { setSelectedLevel(lv); setTab('dashboard'); }} />
      ) : (
        <React.Fragment>
          {tab === 'dashboard' && <KrDashboard stats={scopedStats} onStartStudy={(all) => { setStudyAll(!!all); setTab('study'); }} emptyMessage={isReview ? <React.Fragment>復習ノートが空です。<br/>学習中に「☆ 復習に追加」ボタンを押してみましょう。</React.Fragment> : undefined} />}
          {tab === 'study' && <KrStudySession dueItems={studyAll ? scopedItems : scopedDueItems} pool={scopedItems} submitReview={handleSubmitReview} onToggleBookmark={handleToggleBookmark} onFinish={() => setTab('dashboard')} onActivity={onActivity} />}
          {tab === 'list' && <KrListView deckType={deckType} items={scopedItems} onRemove={(item) => handleToggleBookmark(item, false)} />}
          <nav className="tab-bar">
            <button className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>ホーム</button>
            <button className={tab === 'study' ? 'active' : ''} onClick={() => setTab('study')}>学習</button>
            <button className={tab === 'list' ? 'active' : ''} onClick={() => setTab('list')}>リスト</button>
          </nav>
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

  const [loading, setLoading] = useState(false);

  function getMessage(code) {
    const table = ERROR_MESSAGES[mode];
    return table[code] || table.default;
  }

  function handleSignIn() {
    setError('');
    setLoading(true);
    signInWithEmail(email, password).catch((e) => setError(getMessage(e.code))).finally(() => setLoading(false));
  }
  function handleSignUp() {
    setError('');
    setLoading(true);
    signUpWithEmail(email, password).catch((e) => setError(getMessage(e.code))).finally(() => setLoading(false));
  }

  return (
    <div className="login-box">
      <p>

      {error && <div className="login-error">{error}</div>}
      <div className="action-row">
        <button className="secondary-btn" onClick={handleSignUp} disabled={loading}>{mode === 'ja' ? '회원가입' : '新規登録'}</button>
        <button className="primary-btn" onClick={handleSignIn} disabled={loading}>{mode === 'ja' ? '로그인' : 'ログイン'}</button>
      </div>
    </div>
  );
}

// ==================== 최상위 App ====================

const MODE_META = {
  ja: { title: '日本語学習', subtitle: '단어 · 문법 · 한자 · 회화' },
  kr: { title: '韓国語学習', subtitle: '単語・文法・会話' },
};

function App() {
  const [user, setUser] = useState(undefined);
  const [mode, setMode] = useState('ja');
  const [modeInitialized, setModeInitialized] = useState(false);
  const [focusMode, setFocusMode] = useState(false);
  const userStats = useUserStats(user);

  useEffect(() => {
    const unsub = subscribeToAuth(setUser);
    return () => unsub();
  }, []);

  // 계정에 저장된 마지막 학습 언어를 불러와서 최초 1회만 자동 적용
  useEffect(() => {
    if (!modeInitialized && userStats.preferredMode) {
      setMode(userStats.preferredMode);
      setModeInitialized(true);
    }
  }, [userStats.preferredMode, modeInitialized]);

  function handleModeChange(next) {
    setMode(next);
    setModeInitialized(true);
    userStats.setPreferredMode(next);
  }

  const meta = MODE_META[mode];

  return (
    <div className="app-shell">
      <header className="app-header">
        <div>
          <h1 className="jp-text">{meta.title}</h1>
          <div className="subtitle">{meta.subtitle}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {user && (userStats.streak > 0 || userStats.xp > 0) && (
            <div className="streak-badge mono" title={mode === 'ja' ? '연속 학습일 · 누적 XP' : '連続学習日数・累計XP'}>
              🔥{userStats.streak} · ⭐{userStats.xp}
            </div>
          )}
          {user && (
            <button onClick={signOutUser} style={{ background: 'none', border: 'none', fontSize: 12, color: 'var(--ink-soft)', cursor: 'pointer' }}>
              {mode === 'ja' ? '로그아웃' : 'ログアウト'}
            </button>
          )}
        </div>
      </header>

      {!focusMode && (
        <div className="deck-switch" style={{ marginBottom: 18 }}>
          <button className={mode === 'ja' ? 'active' : ''} onClick={() => handleModeChange('ja')}>日本語</button>
          <button className={mode === 'kr' ? 'active' : ''} onClick={() => handleModeChange('kr')}>한국어</button>
        </div>
      )}

      {user === undefined ? (
        <div className="empty-state">{mode === 'ja' ? '불러오는 중...' : '読み込み中...'}</div>
      ) : user === null ? (
        <LoginForm mode={mode} />
      ) : mode === 'ja' ? (
        <JaSection user={user} onActivity={userStats.recordActivity} onFocusChange={setFocusMode} />
      ) : (
        <KrSection user={user} onActivity={userStats.recordActivity} onFocusChange={setFocusMode} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
<script>
  (function () {
    var source = document.getElementById('app-source').textContent;
    var result = Babel.transform(source, {
      presets: [['react', { runtime: 'classic' }]],
    });
    var script = document.createElement('script');
    script.textContent = result.code;
    document.body.appendChild(script);
  })();
</script>
</body>
</html>
