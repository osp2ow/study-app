<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1B3A4B" />
<title>日本語 / 한국어 学習・공부</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
  rel="stylesheet"
/>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Babel (브라우저에서 바로 JSX 해석 - 별도 빌드/컴파일 과정 불필요) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<!-- Firebase (compat 버전 - 옛날 방식 문법, CDN 스크립트 태그만으로 동작) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root {
  /* 화색(和色) 기반 팔레트 */
  --paper: #f5f1e6;         /* 생성리(生成り) - 바탕 */
  --paper-line: #ddd3ba;    /* 원고지 격자선 */
  --ink: #2b2b28;           /* 스미(墨) - 본문 텍스트 */
  --ink-soft: #5c584f;
  --indigo: #1b3a4b;        /* 아이이로(藍色) - 주요 색상 */
  --indigo-soft: #2f5468;
  --vermillion: #9c3b2e;    /* 벵가라이로(弁柄色) - 낙관/강조 */
  --vermillion-soft: #c9584a;
  --moss: #4c6444;          /* 모스그린 - 완료/숙련 상태 */
  --gold: #b08d3f;          /* 금색 - 배지 */
  --card-shadow: 0 2px 10px rgba(43, 43, 40, 0.08);
  --radius: 4px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--paper);
  background-image:
    linear-gradient(var(--paper-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--ink);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

.jp-text {
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

.app-shell {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 96px;
  min-height: 100vh;
}

/* 상단 헤더 */
.app-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 8px 4px 20px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 20px;
}

.streak-badge {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
}

.app-header h1 {
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  letter-spacing: 0.02em;
}

.app-header .subtitle {
  font-size: 12px;
  color: var(--ink-soft);
}

/* 하단 탭 네비게이션 */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--paper);
  border-top: 2px solid var(--ink);
  max-width: 640px;
  margin: 0 auto;
}

.tab-bar button {
  flex: 1;
  padding: 14px 0 12px;
  background: none;
  border: none;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  border-top: 3px solid transparent;
}

.tab-bar button.active {
  color: var(--indigo);
  border-top: 3px solid var(--vermillion);
}

/* 낙관(hanko) 스탬프 배지 - 급수 표시 */
.hanko {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--vermillion);
  color: var(--vermillion);
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
  font-weight: 700;
  font-size: 13px;
  transform: rotate(-4deg);
  flex-shrink: 0;
}

/* 원고지 스타일 카드 - 단어 학습의 시그니처 요소 */
.genkou-card {
  position: relative;
  background: #fffdf8;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 32px 20px;
  text-align: center;
}

.genkou-square {
  width: 120px;
  height: 120px;
  margin: 0 auto 18px;
  border: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background:
    linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0 / 100% 33.3%,
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0 / 33.3% 100%;
}

.genkou-square .char {
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
  font-size: 44px;
  font-weight: 500;
  color: var(--ink);
}

.reading {
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--ink-soft);
  margin-bottom: 4px;
}

.meaning {
  font-size: 18px;
  font-weight: 700;
  margin: 12px 0 8px;
}

.example {
  font-size: 13px;
  color: var(--ink-soft);
  border-top: 1px dashed var(--paper-line);
  padding-top: 12px;
  margin-top: 12px;
  line-height: 1.6;
}

/* 문법 패턴 카드 */
.pattern-plate {
  background: var(--indigo);
  color: var(--paper);
  border-radius: var(--radius);
  padding: 26px 18px;
  margin-bottom: 18px;
}

.pattern-plate .pattern {
  font-size: 28px;
  font-weight: 700;
}

.pattern-plate .meaning-hint {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 8px;
}

.scene-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.18);
  padding: 3px 10px;
  border-radius: 999px;
  margin-bottom: 10px;
}

.connection-note {
  background: #f1ead6;
  border-left: 3px solid var(--gold);
  padding: 10px 12px;
  font-size: 13px;
  text-align: left;
  margin-bottom: 10px;
  border-radius: 2px;
}

.korean-contrast {
  background: #f3dbd6;
  border-left: 3px solid var(--vermillion);
  padding: 10px 12px;
  font-size: 13px;
  text-align: left;
  line-height: 1.6;
  margin-top: 12px;
  border-radius: 2px;
}

/* 단어/문법 덱 전환 */
.deck-switch {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.deck-switch button {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--ink);
  background: transparent;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border-radius: var(--radius);
}

.deck-switch button.active {
  background: var(--vermillion);
  border-color: var(--vermillion);
  color: #fffdf8;
}

/* 4지선다 퀴즈 보기 */
.option-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
}

.option-btn {
  padding: 14px 16px;
  border: 1.5px solid var(--ink);
  border-radius: var(--radius);
  background: #fffdf8;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
}

.option-btn:disabled {
  cursor: default;
}

.option-correct {
  background: var(--moss);
  border-color: var(--moss);
  color: #fffdf8;
}

.option-wrong {
  background: var(--vermillion);
  border-color: var(--vermillion);
  color: #fffdf8;
}

.feedback {
  margin-top: 16px;
  font-weight: 700;
  font-size: 14px;
}

.feedback-correct { color: var(--moss); }
.feedback-wrong { color: var(--vermillion); }

/* 급수 선택 화면 */
.level-picker {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.level-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px;
  border: 1.5px solid var(--ink);
  border-radius: var(--radius);
  background: #fffdf8;
  cursor: pointer;
}

.level-btn:not(:disabled):hover {
  border-color: var(--vermillion);
}

.level-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.level-btn-label {
  font-size: 20px;
  font-weight: 700;
  color: var(--indigo);
}

.level-btn-count {
  font-size: 12px;
  color: var(--ink-soft);
}

.change-level-link {
  display: block;
  background: none;
  border: none;
  font-size: 12px;
  color: var(--ink-soft);
  text-decoration: underline;
  cursor: pointer;
  padding: 0 2px 14px;
}

/* 정답 확인 후 액션 버튼 (복습에 추가 / 다음) */
/* 문장 조합(작문) 문제 - 단어 조각을 순서대로 배치 */
.sentence-answer-row {
  min-height: 52px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  border: 2px dashed var(--paper-line);
  border-radius: var(--radius);
  margin-bottom: 14px;
  align-items: center;
}

.sentence-placeholder {
  font-size: 12px;
  color: var(--ink-soft);
}

.sentence-pool-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 4px;
}

.tile-btn {
  padding: 10px 14px;
  border: 1.5px solid var(--indigo);
  border-radius: var(--radius);
  background: #fffdf8;
  color: var(--indigo);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}

.tile-btn.placed {
  background: var(--indigo);
  color: #fffdf8;
}

.tile-btn.tile-correct {
  background: var(--moss);
  border-color: var(--moss);
  color: #fffdf8;
}

.tile-btn.tile-wrong {
  background: var(--vermillion);
  border-color: var(--vermillion);
  color: #fffdf8;
}

.tile-btn:disabled {
  cursor: default;
}

.tile-btn ruby {
  ruby-position: over;
}

.tile-btn rt {
  font-size: 10px;
  color: inherit;
  opacity: 0.75;
  font-weight: 500;
}

/* AI 회화 채팅 화면 */
.mic-btn {
  width: 46px !important;
  height: 46px;
  flex: 0 0 46px !important;
  border-radius: 50%;
  border: 1.5px solid var(--indigo);
  background: #fffdf8;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mic-btn.recording {
  background: var(--vermillion);
  border-color: var(--vermillion);
  animation: mic-pulse 1s infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(156, 59, 46, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(156, 59, 46, 0); }
}

.chat-recording {
  opacity: 0.7;
  font-style: italic;
}

.chat-window {
  height: 360px;
  overflow-y: auto;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  background: #fffdf8;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chat-bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  position: relative;
}

.chat-user {
  align-self: flex-end;
  background: var(--indigo);
  color: #fffdf8;
  border-bottom-right-radius: 3px;
}

.chat-ai {
  align-self: flex-start;
  background: var(--paper);
  border: 1px solid var(--paper-line);
  color: var(--ink);
  border-bottom-left-radius: 3px;
}

.chat-loading {
  font-weight: 700;
  color: var(--ink-soft);
}

.chat-translation {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--paper-line);
  font-size: 13px;
  color: var(--ink-soft);
}

.chat-bubble-actions {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

.chat-replay {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.7;
  padding: 0;
}

.chat-translate-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  color: var(--indigo);
  padding: 0;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  width: 100%;
}

.chat-input {
  flex: 1 1 0% !important;
  min-width: 0;
  width: auto !important;
  margin-bottom: 0 !important;
}

.chat-send-btn {
  flex: 0 0 auto !important;
  width: auto !important;
  padding: 14px 18px;
  margin-top: 0;
  white-space: nowrap;
}

.action-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.action-row .primary-btn,
.action-row .secondary-btn {
  flex: 1;
  margin-top: 0;
}

.secondary-btn {
  padding: 16px 8px;
  border: 1.5px solid var(--indigo);
  border-radius: var(--radius);
  background: transparent;
  color: var(--indigo);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
}

.secondary-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #fffdf8;
}

.replay-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: none;
  border: 1px dashed var(--paper-line);
  border-radius: var(--radius);
  color: var(--ink-soft);
  font-size: 12px;
  cursor: pointer;
}

/* 복습노트 진입 버튼 */
.review-bar {
  display: block;
  width: 100%;
  padding: 11px;
  margin-bottom: 18px;
  border: 1.5px dashed var(--gold);
  border-radius: var(--radius);
  background: transparent;
  color: var(--gold);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
}

.review-bar.active {
  background: var(--gold);
  border-style: solid;
  color: #fffdf8;
}

.ai-chat-bar {
  display: block;
  width: 100%;
  padding: 13px;
  margin-bottom: 18px;
  border: 2px solid var(--indigo);
  border-radius: var(--radius);
  background: var(--indigo);
  color: #fffdf8;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(27, 58, 75, 0.3);
}

.ai-chat-bar.active {
  border-color: var(--vermillion);
  box-shadow: 0 0 0 2px var(--vermillion) inset;
}

/* 복습노트 목록에서 원본 덱 표시/제거 버튼 */
.deck-tag {
  display: inline-block;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--indigo);
  background: #e7edf0;
  padding: 1px 7px;
  border-radius: 999px;
  vertical-align: middle;
}

.remove-btn {
  background: none;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  color: var(--ink-soft);
  font-size: 11px;
  padding: 4px 9px;
  cursor: pointer;
}

/* 복습 평가 버튼 */
.rate-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.rate-btn {
  padding: 12px 4px;
  border-radius: var(--radius);
  border: none;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  color: #fff;
}

.rate-again { background: var(--vermillion); }
.rate-hard { background: var(--gold); }
.rate-good { background: var(--indigo); }
.rate-easy { background: var(--moss); }

.rate-btn .sub {
  display: block;
  font-weight: 400;
  font-size: 10px;
  opacity: 0.85;
  margin-top: 2px;
}

/* 대시보드 통계 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-box {
  background: #fffdf8;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 14px 8px;
  text-align: center;
}

.stat-box .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  color: var(--indigo);
}

.stat-box .label {
  font-size: 11px;
  color: var(--ink-soft);
  margin-top: 2px;
}

.primary-btn {
  width: 100%;
  padding: 16px;
  background: var(--indigo);
  color: #fffdf8;
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
}

.primary-btn:disabled {
  opacity: 0.5;
}

/* 단어 리스트 */
.level-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
}

.level-tabs button {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--ink);
  background: transparent;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.level-tabs button.active {
  background: var(--indigo);
  border-color: var(--indigo);
  color: #fffdf8;
}

.word-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 6px;
  border-bottom: 1px solid var(--paper-line);
}

.word-row .info .jp {
  font-family: 'Noto Serif JP', 'Noto Serif KR', serif;
  font-size: 17px;
}

.word-row .info .kr {
  font-size: 12px;
  color: var(--ink-soft);
}

.status-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
}

.status-new { background: #e6e1d3; color: var(--ink-soft); }
.status-learning { background: #f1e0c9; color: var(--gold); }
.status-due { background: #f3dbd6; color: var(--vermillion); }
.status-mastered { background: #dfe6d9; color: var(--moss); }

.login-box {
  text-align: center;
  padding: 60px 20px;
}

.login-box p {
  color: var(--ink-soft);
  font-size: 13px;
  margin-bottom: 20px;
}

.login-input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1.5px solid var(--paper-line);
  border-radius: var(--radius);
  background: #fffdf8;
  color: var(--ink);
  font-size: 14px;
  box-sizing: border-box;
}

.login-input:focus {
  outline: none;
  border-color: var(--indigo);
}

.login-error {
  color: var(--vermillion);
  font-size: 12px;
  margin: 4px 0 12px;
  text-align: left;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-soft);
}

.genkou-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0;
  max-width: 340px;
  margin: 0 auto 16px;
}

.genkou-cell {
  width: 54px;
  height: 54px;
  border: 1px solid var(--ink);
  margin: -0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0 / 100% 33.3%,
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0 / 33.3% 100%;
}

.genkou-cell .char {
  font-size: 24px;
  font-weight: 500;
  color: var(--ink);

// Worker 배포 후 여기에 본인 Worker 주소를 넣으세요. 비워두면 "AI 회화" 화면에 안내 문구가 뜹니다.
const AI_WORKER_URL = 'https://ancient-mouse-c47study-app.osp2ow.workers.dev/';

// Gemini TTS는 원시 PCM 오디오를 base64로 돌려주므로, 브라우저에서 재생 가능하도록
// WAV 헤더를 씌워준다. (24kHz, mono, 16bit 가정 - Gemini TTS 기본 출력 포맷)
function pcmBase64ToWavBlob(base64, sampleRate, numChannels, bitsPerSample) {
  sampleRate = sampleRate || 24000;
  numChannels = numChannels || 1;
  bitsPerSample = bitsPerSample || 16;

  const binary = atob(base64);
  const len = binary.length;
  const buffer = new ArrayBuffer(44 + len);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
  const blockAlign = (numChannels * bitsPerSample) / 8;

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + len, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(36, 'data');
  view.setUint32(40, len, true);

  const bytes = new Uint8Array(buffer, 44);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

  return new Blob([buffer], { type: 'audio/wav' });
}

let currentAiAudio = null;

// AI 회화 답변을 Gemini 음성으로 읽어준다. 실패(할당량 초과 등)하면 조용히 브라우저 음성으로 대체.
async function speakWithGemini(text, fallbackSpeak) {
  if (!text || !AI_WORKER_URL) {
    fallbackSpeak(text);
    return;
  }
  if (currentAiAudio) {
    currentAiAudio.pause();
    currentAiAudio = null;
  }
  try {
    const res = await fetch(AI_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'tts', text }),
    });
    const data = await res.json();
    if (!data.audioBase64) {
      fallbackSpeak(text);
      return;
    }
    const blob = pcmBase64ToWavBlob(data.audioBase64, 24000, 1, 16);
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAiAudio = audio;
    audio.onerror = () => fallbackSpeak(text);
    audio.play().catch(() => fallbackSpeak(text));
  } catch (e) {
    fallbackSpeak(text);
  }
}

// ==================== SM-2 SRS 알고리즘 ====================
const RATING = { AGAIN: 0, HARD: 3, GOOD: 4, EASY: 5 };
const DAY_MS = 24 * 60 * 60 * 1000;

function scheduleNext(prev, quality) {
  prev = prev || {};
  let repetition = prev.repetition !== undefined ? prev.repetition : 0;
  let easeFactor = prev.easeFactor !== undefined ? prev.easeFactor : 2.5;
  let interval = prev.interval !== undefined ? prev.interval : 0;
  if (quality < 3) {
    repetition = 0;
    interval = 0;
  } else {
    if (repetition === 0) interval = 1;
    else if (repetition === 1) interval = 6;
    else interval = Math.round(interval * easeFactor);
    repetition += 1;
  }
  easeFactor = Math.max(1.3, easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  const now = Date.now();
  const nextReview = quality < 3
    ? new Date(now + 10 * 60 * 1000).toISOString()
    : new Date(now + interval * DAY_MS).toISOString();
  return {
    repetition,
    easeFactor: Number(easeFactor.toFixed(2)),
    interval,
    nextReview,
    lastReviewed: new Date(now).toISOString(),
  };
}
function getStatus(srs) {
  if (!srs || srs.repetition === undefined) return 'new';
  if (srs.repetition >= 5 && srs.interval >= 21) return 'mastered';
  if (new Date(srs.nextReview) <= new Date()) return 'due';
  return 'learning';
}
function isDue(srs) {
  if (!srs || !srs.nextReview) return true;
  return new Date(srs.nextReview) <= new Date();
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function buildOptions(correctItem, pool, getAnswer, count) {
  count = count || 4;
  const correctText = getAnswer(correctItem);
  const seen = new Set();
  const distractorTexts = [];
  pool.forEach((i) => {
    if (i.id === correctItem.id) return;
    const t = getAnswer(i);
    if (!t || t === correctText || seen.has(t)) return;
    seen.add(t);
    distractorTexts.push(t);
  });
  const picked = shuffle(distractorTexts).slice(0, count - 1);
  return shuffle([correctText, ...picked]);
}

// ==================== 정답/오답 효과음 (Web Audio API) ====================
let sharedCtx = null;
function getAudioCtx() {
  if (typeof window === 'undefined') return null;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return null;
  if (!sharedCtx) sharedCtx = new AudioCtx();
  if (sharedCtx.state === 'suspended') sharedCtx.resume();
  return sharedCtx;
}
function playNote(ctx, freq, startTime, duration, type, volume) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}
function playCorrectSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  // "띵동" 초인종 벨소리 - 높은음(띵) 다음 낮은음(동), 살짝 겹치며 은은하게 울리는 느낌
  playNote(ctx, 1318.51, now, 0.35, 'sine', 0.24); // 띵 (E6)
  playNote(ctx, 1046.50, now + 0.16, 0.45, 'sine', 0.24); // 동 (C6)
}

// ==================== 유저 전체 통계 (XP / 연속학습 스트릭 - 듀오링고 스타일) ====================
function useUserStats(user) {
  const [stats, setStats] = useState({ xp: 0, streak: 0, lastStudyDate: null });
  const uid = user ? user.uid : null;

  useEffect(() => {
    if (!uid) { setStats({ xp: 0, streak: 0, lastStudyDate: null }); return; }
    const ref = db.collection('users').doc(uid);
    const unsub = ref.onSnapshot(
      (snap) => {
        const data = snap.data() || {};
        setStats({ xp: data.xp || 0, streak: data.streak || 0, lastStudyDate: data.lastStudyDate || null });
      },
      (err) => console.error('유저 통계 구독 오류:', err.code, err.message)
    );
    return () => unsub();
  }, [uid]);

  const recordActivity = useCallback((correct) => {
    if (!uid) return;
    const ref = db.collection('users').doc(uid);
    const todayStr = new Date().toISOString().slice(0, 10);
    setStats((prev) => {
      let nextStreak = prev.streak || 0;
      if (prev.lastStudyDate !== todayStr) {
        const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        nextStreak = prev.lastStudyDate === yesterdayStr ? nextStreak + 1 : 1;
      }
      const nextXp = (prev.xp || 0) + (correct ? 10 : 2);
      const next = { xp: nextXp, streak: nextStreak, lastStudyDate: todayStr };
      ref.set(next, { merge: true });
      return next;
    });
  }, [uid]);

  return { xp: stats.xp, streak: stats.streak, recordActivity };
}

// ==================== 실제 Firestore 연동 SRS 훅 (모든 덱 공용) ====================
function useSrsDeck(user, deckType, firestoreName, masterList) {
  const [progress, setProgress] = useState({});
  const [loading, setLoading] = useState(true);
  const [seeded, setSeeded] = useState(false);
  const [error, setError] = useState(null);
  const uid = user ? user.uid : null;

  useEffect(() => { setSeeded(false); }, [firestoreName]);

  useEffect(() => {
    if (!uid) { setProgress({}); setLoading(false); return; }
    setLoading(true);
    setError(null);
    const colRef = db.collection('users').doc(uid).collection(firestoreName);
    const unsub = colRef.onSnapshot(
      (snapshot) => {
        const p = {};
        snapshot.forEach((docSnap) => { p[docSnap.id] = docSnap.data(); });
        setProgress(p);
        setLoading(false);
      },
      (err) => {
        console.error('[' + firestoreName + '] Firestore 오류:', err.code, err.message);
        setError(err);
        setLoading(false);
      }
    );
    return () => unsub();
  }, [uid, firestoreName]);

  useEffect(() => {
    if (!uid || loading || seeded || error) return;
    const existingIds = new Set(Object.keys(progress));
    const missing = masterList.filter((item) => !existingIds.has(item.id));
    if (missing.length === 0) { setSeeded(true); return; }
    const batch = db.batch();
    const colRef = db.collection('users').doc(uid).collection(firestoreName);
    missing.forEach((item) => {
      batch.set(colRef.doc(item.id), {
        repetition: 0,
        easeFactor: 2.5,
        interval: 0,
        nextReview: new Date().toISOString(),
        lastReviewed: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    batch.commit().then(() => setSeeded(true));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [uid, firestoreName, loading, seeded, error]);

  const items = useMemo(() => masterList.map((item) => {
    const srs = progress[item.id];
    return { ...item, srs, status: getStatus(srs), due: isDue(srs), sourceDeck: deckType };
  }), [progress, masterList, deckType]);

  const dueItems = useMemo(() => items.filter((i) => i.due), [items]);

  const submitReview = useCallback((itemId, quality) => {
    if (!uid) return;
    const current = progress[itemId];
    const next = scheduleNext(current, quality);
    setProgress((prev) => ({ ...prev, [itemId]: { ...current, ...next } }));
    db.collection('users').doc(uid).collection(firestoreName).doc(itemId).set(
      { ...next, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
  }, [uid, firestoreName, progress]);

  const toggleBookmark = useCallback((itemId, nextValue) => {
    if (!uid) return;
    const current = progress[itemId];
    const value = nextValue !== undefined ? nextValue : !(current && current.bookmarked);
    setProgress((prev) => ({ ...prev, [itemId]: { ...prev[itemId], bookmarked: value } }));
    db.collection('users').doc(uid).collection(firestoreName).doc(itemId).set(
      { bookmarked: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
  }, [uid, firestoreName, progress]);

  const bookmarkedItems = useMemo(() => items.filter((i) => i.srs && i.srs.bookmarked), [items]);

  const stats = useMemo(() => {
    const total = items.length;
    const due = dueItems.length;
    const mastered = items.filter((i) => i.status === 'mastered').length;
    return { total, due, mastered };
  }, [items, dueItems]);

  return { items, dueItems, bookmarkedItems, loading, error, submitReview, toggleBookmark, stats };
}

const JA_DECK_LABELS = { words: '단어', grammar: '문법', kanji: '한자', travel: '회화', sentence: '작문' };

function jaSpeechText(deckType, item) {

function JaQuizCard({ item, pool, onResult, onToggleBookmark }) {
  const deckType = item.sourceDeck;
  const [selected, setSelected] = useState(null);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));
  const getAnswer = JA_ANSWER_GETTERS[deckType];
  const correctText = useMemo(() => getAnswer(item), [item]);
  const options = useMemo(() => buildOptions(item, pool, getAnswer, 4), [item, pool]);
  const speechText = useMemo(() => jaSpeechText(deckType, item), [deckType, item]);
  const answered = selected !== null;
  const isCorrect = selected === correctText;

  useEffect(() => cancelSpeech, []);
  useEffect(() => {
    if (deckType === 'travel' && speechText) {
      const t = setTimeout(() => speakJapanese(speechText), 500);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function handleSelect(opt) {
    if (answered) return;
    const correct = opt === correctText;
    setSelected(opt);
    if (correct) playCorrectSound(); else playWrongSound();
    if (speechText) setTimeout(() => speakJapanese(speechText), 500);
  }
  function handleNext() { onResult(item.id, isCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck); }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        {jaRenderQuestion(deckType, item)}
        <div className="option-list">
          {options.map((opt) => {
            let cls = 'option-btn';
            if (answered) { if (opt === correctText) cls += ' option-correct'; else if (opt === selected) cls += ' option-wrong'; }
            return <button key={opt} className={cls} onClick={() => handleSelect(opt)} disabled={answered}>{opt}</button>;
          })}
        </div>
        {answered && (<React.Fragment>
          <div className={'feedback ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong')}>{isCorrect ? '정답입니다!' : ('오답입니다. 정답: ' + correctText)}</div>
          {jaRenderDetail(deckType, item)}
          {speechText && <button className="replay-btn" onClick={() => speakJapanese(speechText)}>🔊 다시 듣기</button>}
          <div className="action-row">
            <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 복습노트에 있음' : '☆ 복습에 추가'}</button>
            <button className="primary-btn" onClick={handleNext}>다음</button>
          </div>
        </React.Fragment>)}
      </div>
    </div>
  );
}

          return <button key={lv} className="level-btn" disabled={count === 0} onClick={() => onSelect(lv)}><span className="level-btn-label mono">{lv}</span><span className="level-btn-count">{count > 0 ? (count + '개') : '준비중'}</span></button>;
        })}
      </div>
    </div>
  );
}
function JaStudySession({ dueItems, pool, submitReview, onToggleBookmark, onFinish, onActivity }) {
  const [queue, setQueue] = useState(dueItems);
  const [doneCount, setDoneCount] = useState(0);
  const totalCount = useMemo(() => dueItems.length, [dueItems]);
  if (queue.length === 0) return <div className="empty-state"><p>오늘 학습할 항목이 없습니다 🎉</p><button className="primary-btn" onClick={onFinish}>목록으로</button></div>;
  const current = queue[0];
  function handleResult(itemId, quality, sourceDeck) {
    submitReview(itemId, quality, sourceDeck);
    if (onActivity) onActivity(quality >= RATING.HARD);
    setQueue((prev) => { const rest = prev.slice(1); if (quality < RATING.HARD) return [...rest, prev[0]]; return rest; });
    if (quality >= RATING.HARD) setDoneCount((d) => d + 1);
  }
  return (
    <div>
      <div className="mono" style={{ marginBottom: 14, fontSize: 12, color: 'var(--ink-soft)' }}>{doneCount} / {totalCount}</div>
      {current.sourceDeck === 'sentence'
        ? <JaSentenceCard key={current.id + current.sourceDeck} item={current} onResult={handleResult} onToggleBookmark={onToggleBookmark} />
        : <JaQuizCard key={current.id + current.sourceDeck} item={current} pool={pool} onResult={handleResult} onToggleBookmark={onToggleBookmark} />}
    </div>
  );
}
function JaSentenceCard({ item, onResult, onToggleBookmark }) {
  const [pool, setPool] = useState(() => shuffle([...item.tiles, ...(item.distractors || [])].map((t, i) => ({ id: i, text: t.text, reading: t.reading }))));
  const [placed, setPlaced] = useState([]);
  const [checked, setChecked] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));

  useEffect(() => cancelSpeech, []);

  function renderTileLabel(t) {
    if (t.reading && t.reading !== t.text) {
      return <ruby>{t.text}<rt>{t.reading}</rt></ruby>;
    }
    return t.text;
  }

  function placeTile(tile) {
    if (checked) return;
    setPool((prev) => prev.filter((t) => t.id !== tile.id));
    setPlaced((prev) => [...prev, tile]);
    speakJapanese(tile.reading || tile.text);
  }
  function removeTile(tile) {
    if (checked) return;
    setPlaced((prev) => prev.filter((t) => t.id !== tile.id));
    setPool((prev) => [...prev, tile]);
  }
  const isComplete = placed.length === item.tiles.length;
  const correctTextJoined = item.tiles.map((t) => t.text).join('|');

  function handleCheck() {
    const correct = placed.map((t) => t.text).join('|') === correctTextJoined;
    setChecked(true);
    setWasCorrect(correct);
    if (correct) {
      playCorrectSound();
      setTimeout(() => speakJapanese(item.reading || item.tiles.map((t) => t.text).join('')), 500);
    } else {
      playWrongSound();
    }
  }
  function handleNext() {
    onResult(item.id, wasCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck);
  }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        <div className="pattern-plate">
          <div className="meaning-hint" style={{ fontSize: 12, opacity: 0.85 }}>다음 문장을 일본어로 배열하세요</div>
          <div className="pattern" style={{ fontSize: 18 }}>{item.meaning}</div>
        </div>

        <div className="sentence-answer-row">
          {placed.length === 0 && <span className="sentence-placeholder">아래 조각을 순서대로 눌러 문장을 완성하세요</span>}
          {placed.map((t) => {
            let cls = 'tile-btn placed jp-text';
            if (checked) cls += wasCorrect ? ' tile-correct' : ' tile-wrong';
            return <button key={t.id} className={cls} onClick={() => removeTile(t)} disabled={checked}>{renderTileLabel(t)}</button>;
          })}
        </div>

        <div className="sentence-pool-row">
          {pool.map((t) => (
            <button key={t.id} className="tile-btn jp-text" onClick={() => placeTile(t)} disabled={checked}>{renderTileLabel(t)}</button>
          ))}
        </div>

        {!checked ? (
          <button className="primary-btn" style={{ marginTop: 16 }} disabled={!isComplete} onClick={handleCheck}>확인</button>
        ) : (
          <React.Fragment>
            <div className={'feedback ' + (wasCorrect ? 'feedback-correct' : 'feedback-wrong')}>{wasCorrect ? '정답입니다!' : '오답입니다.'}</div>
            <div className="example">정답: <span className="jp-text">{item.tiles.map((t) => t.text).join('')}</span>{item.reading && (<React.Fragment><br/>({item.reading})</React.Fragment>)}</div>
            <button className="replay-btn" onClick={() => speakJapanese(item.reading || item.tiles.join(''))}>🔊 다시 듣기</button>
            <div className="action-row">
              <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 복습노트에 있음' : '☆ 복습에 추가'}</button>
              <button className="primary-btn" onClick={handleNext}>다음</button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function JaListView({ deckType, items, onRemove }) {
  const SCENES = ['전체', '공항', '식당', '숙소', '길찾기', '쇼핑', '병원', '대중교통', '긴급상황', '비즈니스'];
  const [scene, setScene] = useState('전체');
  const showSceneFilter = deckType === 'travel';
  const filtered = showSceneFilter && scene !== '전체' ? items.filter((i) => i.scene === scene) : items;
  function primary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.word;
    if (dt === 'grammar') return i.pattern;
    if (dt === 'kanji') return i.char;
    if (dt === 'sentence') return i.tiles.map((t) => t.text).join('');
    return i.japanese;
  }
  function secondary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.meaning;
    if (dt === 'grammar') return i.title;
    if (dt === 'kanji') return i.meaning + ' · 한국음 ' + i.koreanSound;
    if (dt === 'sentence') return i.meaning;
    return i.korean;
  }
  if (items.length === 0) {
    return deckType === 'review'
      ? <div className="empty-state">복습노트가 비어 있습니다.<br/>학습 중 "☆ 복습에 추가" 버튼을 누르면 여기에 모입니다.</div>
      : <div className="empty-state">아직 콘텐츠가 없습니다.</div>;
  }
  return (
    <div>
      {showSceneFilter && (<div className="level-tabs">{SCENES.map((s) => (<button key={s} className={scene === s ? 'active' : ''} onClick={() => setScene(s)}>{s}</button>))}</div>)}
      {filtered.length === 0 ? <div className="empty-state">해당 장면의 회화가 없습니다.</div> : (
        <div>
          {filtered.map((i) => (
            <div className="word-row" key={deckType === 'review' ? (i.sourceDeck + '-' + i.id) : i.id}>
              <div className="info">
                <div className="jp">{primary(i)}{deckType === 'review' && <span className="deck-tag" style={{ marginLeft: 6 }}>{JA_DECK_LABELS[i.sourceDeck]}</span>}</div>
                <div className="kr">{secondary(i)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className={'status-badge status-' + i.status}>{STATUS_LABEL[i.status]}</span>
                {deckType === 'review' && <button className="remove-btn" onClick={() => onRemove(i)}>제거</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function buildSystemPrompt(mode, level, scenario) {
  if (mode === 'ja') {
    let p = '당신은 한국인 일본어 학습자와 대화 연습을 하는 친절한 일본어 회화 파트너입니다. ' +
      'JLPT ' + level + ' 수준에 맞는 어휘와 문법만 사용해서 원칙적으로는 일본어로만 대답하세요. ' +
      '단, 사용자가 한국어로 질문하거나(예: "이거 일본어로 뭐예요?", "방금 그 단어 무슨 뜻이에요?", 말이 막혀서 도움을 요청하는 경우 등) 하면, ' +
      '그때는 예외적으로 한국어로 친절하고 명확하게 답변해서 도와주고, 그다음 다시 자연스럽게 일본어 대화로 이어가세요. ' +
      '답변은 1~3문장으로 짧게 하세요.';
    if (scenario && scenario.role) {
      p += ' 지금은 역할극 상황입니다. 당신은 "' + scenario.role + '" 역할을 맡아 자연스럽게 연기해주세요.';
    }
    p += ' 반드시 아래 형식으로만 답변하고 그 외 다른 텍스트는 절대 쓰지 마세요:\n' +
      'MAIN||(답변 - 보통은 일본어. 사용자가 한국어로 도움을 요청했다면 이 부분도 한국어로)\n' +
      'TRANS||(MAIN이 일본어라면 그 한국어 번역을, 한국어로 답했다면 그 내용을 자연스러운 일본어로 다시 써서 적기. 사용자 문장에 문법이나 단어 실수가 있었다면 짧고 부드럽게 고쳐서 덧붙이기)';
    return p;
  }
  let p = 'あなたは日本人の韓国語学習者と会話練習をする親切な韓国語会話パートナーです。' +
    'TOPIK ' + level + 'レベルに合う語彙・文法だけを使って、原則として韓国語だけで答えてください。' +
    'ただし、ユーザーが日本語で質問したり(例:「これ韓国語で何て言いますか」「さっきの単語の意味は?」、言葉に詰まって助けを求める場合など)する時は、' +
    'その時だけ例外的に日本語で親切に分かりやすく答えて助けてあげて、その後また自然に韓国語の会話に戻ってください。' +
    '返答は1〜3文程度で短くしてください。';
  if (scenario && scenario.role) {
    p += ' 今はロールプレイの状況です。あなたは「' + scenario.role + '」の役を自然に演じてください。';
  }
  p += ' 必ず下記の形式だけで答えて、それ以外のテキストは絶対に書かないでください:\n' +
    'MAIN||(返答 - 通常は韓国語。ユーザーが日本語で助けを求めた場合はこの部分も日本語で)\n' +
    'TRANS||(MAINが韓国語ならその日本語訳を、日本語で答えたならその内容を自然な韓国語で書き直して記載。ユーザーの文に文法や単語の間違いがあれば、短く優しく直して付け加える)';
  return p;
}

function parseAiReply(raw) {
  const mainMatch = raw.match(/MAIN\|\|([\s\S]*?)(?=\n?TRANS\|\||$)/);
  const transMatch = raw.match(/TRANS\|\|([\s\S]*)/);
  if (mainMatch) {
    return {
      text: mainMatch[1].trim(),
      translation: transMatch ? transMatch[1].trim() : null,
    };
  }
  return { text: raw.trim(), translation: null };
}

function AiChatSection({ mode }) {
  const levels = mode === 'ja' ? ['N5', 'N4', 'N3', 'N2', 'N1'] : ['1급', '2급', '3급', '4급', '5급', '6급'];
  const scenarios = AI_SCENARIOS[mode];
  const [level, setLevel] = useState(levels[0]);
  const [scenarioId, setScenarioId] = useState('free');
  const [messages, setMessages] = useState([]);
  const [shownTranslations, setShownTranslations] = useState(() => new Set());
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const speak = mode === 'ja' ? speakJapanese : speakKorean;
  const scenario = scenarios.find((s) => s.id === scenarioId);

  async function sendMessage(overrideText) {
    const text = (overrideText !== undefined ? overrideText : input).trim();
    if (!text || loading) return;
    if (!AI_WORKER_URL) {
      setMessages((prev) => [...prev, { role: 'user', text }, { role: 'model', text: mode === 'ja' ? '⚠️ 아직 AI 서버 주소가 설정되지 않았습니다. AI_WORKER_URL을 채워주세요.' : '⚠️ まだAIサーバーのアドレスが設定されていません。AI_WORKER_URLを入力してください。' }]);
      setInput('');
      return;
    }
    const userMsg = { role: 'user', text };
    const nextMessages = [...messages, userMsg];
    setMessages(nextMessages);
    setInput('');
    setLoading(true);
    try {
      const res = await fetch(AI_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemPrompt: buildSystemPrompt(mode, level, scenario),
          messages: nextMessages.map((m) => ({ role: m.role, text: m.text })),
        }),
      });
      const data = await res.json();
      const rawReply = data.reply || data.error || (mode === 'ja' ? '(응답을 받지 못했습니다)' : '(返信を受け取れませんでした)');
      const parsed = parseAiReply(rawReply);
      setMessages((prev) => [...prev, { role: 'model', text: parsed.text, translation: parsed.translation }]);
      setTimeout(() => speakWithGemini(parsed.text, speak), 300);
    } catch (e) {
      setMessages((prev) => [...prev, { role: 'model', text: mode === 'ja' ? '오류가 발생했습니다. 다시 시도해주세요.' : 'エラーが発生しました。もう一度お試しください。' }]);
    } finally {
      setLoading(false);
    }
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  const [recording, setRecording] = useState(false);
  const recognitionRef = useRef(null);
  const recordingRef = useRef(false);
  const finalTranscriptRef = useRef('');
  const speechSupported = typeof window !== 'undefined' && !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  function startRecording() {
    if (!speechSupported || recordingRef.current || loading) return;
    finalTranscriptRef.current = '';
    setInput('');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = mode === 'ja' ? 'ja-JP' : 'ko-KR';
    // 말이 잠깐 끊겨도(더듬거려도) 계속 듣고, 사용자가 마이크를 다시 눌러야 전송됨
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalTranscriptRef.current += transcript;
        else interim += transcript;
      }
      setInput((finalTranscriptRef.current + interim).trim());
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      recordingRef.current = false;
      setRecording(false);
    };
    recognition.onend = () => {
      // 브라우저가 일정 시간 후 자동으로 세션을 끊는 경우, 사용자가 아직 멈추지 않았다면 이어서 계속 들음
      if (recordingRef.current) {
        try { recognition.start(); } catch (e) {}
      }
    };
    recognitionRef.current = recognition;
    recordingRef.current = true;
    setRecording(true);
    recognition.start();
  }
  function stopRecording() {
    recordingRef.current = false;
    setRecording(false);
    if (recognitionRef.current) {
      recognitionRef.current.onend = null;
      recognitionRef.current.stop();
    }
    const text = (finalTranscriptRef.current || input).trim();
    if (text) sendMessage(text);
  }

  return (
    <div>
      <div className="level-tabs">
        {levels.map((lv) => (
          <button key={lv} className={level === lv ? 'active' : ''} onClick={() => setLevel(lv)}>{lv}</button>
        ))}
      </div>
      <div className="level-tabs">
        {scenarios.map((s) => (
          <button key={s.id} className={scenarioId === s.id ? 'active' : ''} onClick={() => setScenarioId(s.id)}>{s.label}</button>
        ))}
      </div>

      {!AI_WORKER_URL && (
        <div className="banner" style={{ marginTop: 0 }}>
          {mode === 'ja'
            ? 'AI 회화는 별도 서버(Cloudflare Worker) 설정이 필요합니다. 설정 전까지는 체험만 가능합니다.'
            : 'AI会話には別途サーバー(Cloudflare Worker)の設定が必要です。設定前は体験のみ可能です。'}
        </div>
      )}

      {!speechSupported && (
        <div className="banner" style={{ marginTop: 0 }}>
          {mode === 'ja'
            ? '이 브라우저는 음성 인식을 지원하지 않아요. 텍스트로 입력해주세요. (Chrome/Edge 권장)'
            : 'このブラウザは音声認識に対応していません。テキストで入力してください。（Chrome/Edge推奨）'}
        </div>
      )}

      <div className="chat-window" ref={scrollRef}>
        {messages.length === 0 && (
          <div className="empty-state" style={{ padding: '30px 16px' }}>
            {mode === 'ja' ? '마이크 버튼을 눌러 말하거나, 메시지를 입력해보세요!' : 'マイクボタンを押して話すか、メッセージを入力してみましょう!'}
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} className={'chat-bubble ' + (m.role === 'user' ? 'chat-user' : 'chat-ai')}>
            <span className="jp-text">{m.text}</span>
            {m.role === 'model' && m.translation && shownTranslations.has(i) && (
              <div className="chat-translation">{m.translation}</div>
            )}
            {m.role === 'model' && (
              <div className="chat-bubble-actions">
                <button className="chat-replay" onClick={() => speakWithGemini(m.text, speak)}>🔊</button>
                {m.translation && (
                  <button
                    className="chat-translate-btn"
                    onClick={() => {
                      setShownTranslations((prev) => {
                        const next = new Set(prev);
                        if (next.has(i)) next.delete(i);
                        else next.add(i);
                        return next;
                      });
                    }}
                  >
                    {shownTranslations.has(i) ? (mode === 'ja' ? '번역 숨기기' : '訳を隠す') : (mode === 'ja' ? '🔤 번역' : '🔤 訳')}
                  </button>
                )}
              </div>
            )}
          </div>
        ))}
        {loading && <div className="chat-bubble chat-ai chat-loading">···</div>}
        {recording && (
          <div className="chat-bubble chat-user chat-recording">
            🎙️ {mode === 'ja' ? '듣고 있어요... (다 말하면 마이크를 다시 눌러 전송)' : '聞いています...(話し終わったらもう一度マイクを押して送信)'}
          </div>
        )}
      </div>

      <div className="chat-input-row">
        {speechSupported && (
          <button
            className={'mic-btn' + (recording ? ' recording' : '')}
            onClick={recording ? stopRecording : startRecording}
            disabled={loading}
            title={mode === 'ja' ? '마이크로 말하기' : 'マイクで話す'}
          >
            {recording ? '⏹️' : '🎤'}
          </button>
        )}
        <input
          className="login-input chat-input"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder={mode === 'ja' ? '메시지 입력 또는 마이크로 말하기...' : 'メッセージ入力またはマイクで話す...'}
        />
        <button className="primary-btn chat-send-btn" onClick={() => sendMessage()} disabled={loading}>
          {mode === 'ja' ? '전송' : '送信'}
        </button>
      </div>
    </div>
  );
}

function JaSection({ user, onActivity }) {
  const [deckType, setDeckType] = useState('words');
  const [selectedLevel, setSelectedLevel] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [studyAll, setStudyAll] = useState(false);

  const wordDeck = useSrsDeck(user, 'words', 'ja_words', VOCAB_JA);
  const grammarDeck = useSrsDeck(user, 'grammar', 'ja_grammar', GRAMMAR_JA);
  const kanjiDeck = useSrsDeck(user, 'kanji', 'ja_kanji', KANJI_JA);
  const travelDeck = useSrsDeck(user, 'travel', 'ja_travel', TRAVEL_JA);
  const sentenceDeck = useSrsDeck(user, 'sentence', 'ja_sentence', SENTENCE_JA);
  const decks = { words: wordDeck, grammar: grammarDeck, kanji: kanjiDeck, travel: travelDeck, sentence: sentenceDeck };

  const anyLoading = wordDeck.loading || grammarDeck.loading || kanjiDeck.loading || travelDeck.loading || sentenceDeck.loading;
  const anyError = wordDeck.error || grammarDeck.error || kanjiDeck.error || travelDeck.error || sentenceDeck.error;

  const bookmarkedItems = useMemo(() => [
    ...wordDeck.bookmarkedItems, ...grammarDeck.bookmarkedItems, ...kanjiDeck.bookmarkedItems, ...travelDeck.bookmarkedItems, ...sentenceDeck.bookmarkedItems,
  ], [wordDeck.bookmarkedItems, grammarDeck.bookmarkedItems, kanjiDeck.bookmarkedItems, travelDeck.bookmarkedItems, sentenceDeck.bookmarkedItems]);

  const isReview = deckType === 'review';
  const isAiChat = deckType === 'ai_chat';
  const activeDeck = (isReview || isAiChat) ? null : decks[deckType];
  const unscopedItems = isReview ? bookmarkedItems : (activeDeck ? activeDeck.items : []);
  const needsLevelPick = !selectedLevel && unscopedItems.length > 0;
  const scopedItems = useMemo(() => (!selectedLevel ? unscopedItems : unscopedItems.filter((i) => i.level === selectedLevel)), [unscopedItems, selectedLevel]);
  const scopedDueItems = useMemo(() => (isReview ? scopedItems : scopedItems.filter((i) => i.due)), [isReview, scopedItems]);
  const scopedStats = useMemo(() => ({ total: scopedItems.length, due: scopedDueItems.length, mastered: scopedItems.filter((i) => i.status === 'mastered').length }), [scopedItems, scopedDueItems]);
  const levelCounts = useMemo(() => { const c = {}; unscopedItems.forEach((i) => { c[i.level] = (c[i.level] || 0) + 1; }); return c; }, [unscopedItems]);

  function switchDeck(next) { setDeckType(next); setSelectedLevel(null); setTab('dashboard'); setStudyAll(false); }
  function handleSubmitReview(itemId, quality, sourceDeck) { decks[sourceDeck] && decks[sourceDeck].submitReview(itemId, quality); }
  function handleToggleBookmark(item, nextValue) { decks[item.sourceDeck] && decks[item.sourceDeck].toggleBookmark(item.id, nextValue); }

  return (
    <React.Fragment>
      <div className="deck-switch">{Object.entries(JA_DECK_LABELS).map(([key, label]) => (<button key={key} className={deckType === key ? 'active' : ''} onClick={() => switchDeck(key)}>{label}</button>))}</div>
      <button className={'review-bar ' + (isReview ? 'active' : '')} onClick={() => switchDeck('review')}>★ 복습노트{bookmarkedItems.length > 0 ? (' (' + bookmarkedItems.length + ')') : ''}</button>
      <button className={'ai-chat-bar ' + (isAiChat ? 'active' : '')} onClick={() => switchDeck('ai_chat')}>🤖 AI 회화</button>

      {isAiChat ? (
        <AiChatSection mode="ja" />
      ) : anyLoading ? (
        <div className="empty-state">학습 데이터 불러오는 중...</div>
      ) : anyError ? (
        <div className="empty-state">데이터를 불러오지 못했습니다.<br/>Firestore 보안 규칙이 게시되어 있는지 확인해주세요.<br/><span className="mono" style={{ fontSize: 11, opacity: 0.7 }}>{anyError.code}</span></div>
      ) : needsLevelPick ? (
        <JaLevelPicker levelCounts={levelCounts} onSelect={(lv) => { setSelectedLevel(lv); setTab('dashboard'); }} />
      ) : (
        <React.Fragment>
          {selectedLevel && <button className="change-level-link" onClick={() => setSelectedLevel(null)}>← 급수 다시 선택 ({selectedLevel})</button>}
          {tab === 'dashboard' && <JaDashboard stats={scopedStats} onStartStudy={(all) => { setStudyAll(!!all); setTab('study'); }} emptyMessage={isReview ? <React.Fragment>복습노트가 비어 있습니다.<br/>학습 중 "☆ 복습에 추가" 버튼을 눌러보세요.</React.Fragment> : undefined} />}
          {tab === 'study' && <JaStudySession dueItems={studyAll ? scopedItems : scopedDueItems} pool={scopedItems} submitReview={handleSubmitReview} onToggleBookmark={handleToggleBookmark} onFinish={() => setTab('dashboard')} onActivity={onActivity} />}
          {tab === 'list' && <JaListView deckType={deckType} items={scopedItems} onRemove={(item) => handleToggleBookmark(item, false)} />}
          <nav className="tab-bar">
            <button className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>홈</button>
            <button className={tab === 'study' ? 'active' : ''} onClick={() => setTab('study')}>학습</button>
            <button className={tab === 'list' ? 'active' : ''} onClick={() => setTab('list')}>목록</button>
          </nav>
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

// ==================== KR 섹션 (한국어 학습, UI 일본어) ====================

const KR_DECK_LABELS = { words: '単語', grammar: '文法', travel: '会話', sentence: '作文' };
const KR_ANSWER_GETTERS = {
  words: (i) => i.meaningJp,
  grammar: (i) => i.titleJp,
  travel: (i) => i.japanese,
};
function krSplitChars(text) { return Array.from(text || ''); }
function krSpeechText(deckType, item) {
  if (deckType === 'words') return item.example || item.word;
  if (deckType === 'grammar') return item.example;
  if (deckType === 'travel') return item.korean;
  return null;
}
function krRenderQuestion(deckType, item) {
  if (deckType === 'words') return <div className="genkou-row">{krSplitChars(item.word).map((ch, i) => (<div className="genkou-cell" key={i}><span className="char">{ch}</span></div>))}</div>;
  if (deckType === 'grammar') return <div className="pattern-plate"><div className="pattern jp-text">{item.pattern}</div></div>;
  return (<div className="pattern-plate">
    <div className="scene-tag">{item.scene}</div>
    <div className="pattern jp-text" style={{ fontSize: 19 }}>{item.korean}</div>
    <div className="meaning-hint">{item.pronunciation}</div>
  </div>);
}
function krRenderDetail(deckType, item) {
  if (deckType === 'words') return <div className="example">{item.example}<br/>({item.examplePronunciation})<br/>{item.exampleMeaningJp}</div>;
  if (deckType === 'grammar') return (<React.Fragment>
    <div className="connection-note"><strong>接続</strong> · {item.connection}</div>
    <div className="example">{item.example}<br/>{item.exampleMeaningJp}</div>
    <div className="korean-contrast"><strong>日本語話者向けノート</strong><br/>{item.japaneseNote}</div>
  </React.Fragment>);
  return <div className="connection-note">{item.note}</div>;
}

function KrQuizCard({ item, pool, onResult, onToggleBookmark }) {
  const deckType = item.sourceDeck;
  const [selected, setSelected] = useState(null);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));
  const getAnswer = KR_ANSWER_GETTERS[deckType];
  const correctText = useMemo(() => getAnswer(item), [item]);
  const options = useMemo(() => buildOptions(item, pool, getAnswer, 4), [item, pool]);
  const speechText = useMemo(() => krSpeechText(deckType, item), [deckType, item]);
  const answered = selected !== null;
  const isCorrect = selected === correctText;

  useEffect(() => cancelSpeech, []);
  useEffect(() => {
    if (deckType === 'travel' && speechText) {
      const t = setTimeout(() => speakKorean(speechText), 500);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function handleSelect(opt) {
    if (answered) return;
    const correct = opt === correctText;
    setSelected(opt);
    if (correct) playCorrectSound(); else playWrongSound();
    if (speechText) setTimeout(() => speakKorean(speechText), 500);
  }
  function handleNext() { onResult(item.id, isCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck); }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        {krRenderQuestion(deckType, item)}
        <div className="option-list">
          {options.map((opt) => {
            let cls = 'option-btn';
            if (answered) { if (opt === correctText) cls += ' option-correct'; else if (opt === selected) cls += ' option-wrong'; }
            return <button key={opt} className={cls} onClick={() => handleSelect(opt)} disabled={answered}>{opt}</button>;
          })}
        </div>
        {answered && (<React.Fragment>
          <div className={'feedback ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong')}>{isCorrect ? '正解です!' : ('不正解です。正解: ' + correctText)}</div>
          {krRenderDetail(deckType, item)}
          {speechText && <button className="replay-btn" onClick={() => speakKorean(speechText)}>🔊 もう一度聞く</button>}
          <div className="action-row">
            <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 復習ノートに追加済み' : '☆ 復習に追加'}</button>
            <button className="primary-btn" onClick={handleNext}>次へ</button>
          </div>
        </React.Fragment>)}
      </div>
    </div>
  );
}

function KrDashboard({ stats, onStartStudy, emptyMessage }) {
  if (stats.total === 0) return <div className="empty-state">{emptyMessage || <React.Fragment>この級のコンテンツはまだ準備されていません。<br/>他の級を選んでください。</React.Fragment>}</div>;
  return (
    <div>
      <div className="stat-grid">
        <div className="stat-box"><div className="num">{stats.total}</div><div className="label">全体</div></div>
        <div className="stat-box"><div className="num">{stats.due}</div><div className="label">今日の学習</div></div>
        <div className="stat-box"><div className="num">{stats.mastered}</div><div className="label">習熟済み</div></div>
      </div>
      <button className="primary-btn" disabled={stats.due === 0} onClick={() => onStartStudy(false)}>{stats.due > 0 ? ('学習開始 (' + stats.due + '個)') : '今日の学習は完了しました'}</button>
      {stats.total > 0 && (
        <button className="secondary-btn" style={{ width: '100%', marginTop: 10 }} onClick={() => onStartStudy(true)}>
          🔁 全部もう一度解く ({stats.total}個)
        </button>
      )}
    </div>
  );
}
function KrLevelPicker({ levelCounts, onSelect }) {
  const LEVELS = ['1급', '2급', '3급', '4급', '5급', '6급'];
  return (
    <div>
      <div className="empty-state" style={{ padding: '4px 4px 16px' }}>学習する級を選んでください。</div>
      <div className="level-picker">
        {LEVELS.map((lv) => {
          const count = levelCounts[lv] || 0;
          return <button key={lv} className="level-btn" disabled={count === 0} onClick={() => onSelect(lv)}><span className="level-btn-label mono">{lv}</span><span className="level-btn-count">{count > 0 ? (count + '個') : '準備中'}</span></button>;
        })}
      </div>
    </div>
  );
}
function KrStudySession({ dueItems, pool, submitReview, onToggleBookmark, onFinish, onActivity }) {
  const [queue, setQueue] = useState(dueItems);
  const [doneCount, setDoneCount] = useState(0);
  const totalCount = useMemo(() => dueItems.length, [dueItems]);
  if (queue.length === 0) return <div className="empty-state"><p>今日学習する項目がありません 🎉</p><button className="primary-btn" onClick={onFinish}>リストへ</button></div>;
  const current = queue[0];
  function handleResult(itemId, quality, sourceDeck) {
    submitReview(itemId, quality, sourceDeck);
    if (onActivity) onActivity(quality >= RATING.HARD);
    setQueue((prev) => { const rest = prev.slice(1); if (quality < RATING.HARD) return [...rest, prev[0]]; return rest; });
    if (quality >= RATING.HARD) setDoneCount((d) => d + 1);
  }
  return (
    <div>
      <div className="mono" style={{ marginBottom: 14, fontSize: 12, color: 'var(--ink-soft)' }}>{doneCount} / {totalCount}</div>
      {current.sourceDeck === 'sentence'
        ? <KrSentenceCard key={current.id + current.sourceDeck} item={current} onResult={handleResult} onToggleBookmark={onToggleBookmark} />
        : <KrQuizCard key={current.id + current.sourceDeck} item={current} pool={pool} onResult={handleResult} onToggleBookmark={onToggleBookmark} />}
    </div>
  );
}
function KrSentenceCard({ item, onResult, onToggleBookmark }) {
  const [pool, setPool] = useState(() => shuffle([...item.tiles, ...(item.distractors || [])].map((t, i) => ({ id: i, text: t }))));
  const [placed, setPlaced] = useState([]);
  const [checked, setChecked] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);
  const [bookmarked, setBookmarkedState] = useState(!!(item.srs && item.srs.bookmarked));

  useEffect(() => cancelSpeech, []);

  function placeTile(tile) {
    if (checked) return;
    setPool((prev) => prev.filter((t) => t.id !== tile.id));
    setPlaced((prev) => [...prev, tile]);
    speakKorean(tile.text);
  }
  function removeTile(tile) {
    if (checked) return;
    setPlaced((prev) => prev.filter((t) => t.id !== tile.id));
    setPool((prev) => [...prev, tile]);
  }
  const isComplete = placed.length === item.tiles.length;

  function handleCheck() {
    const correct = placed.map((t) => t.text).join('|') === item.tiles.join('|');
    setChecked(true);
    setWasCorrect(correct);
    if (correct) {
      playCorrectSound();
      setTimeout(() => speakKorean(item.reading || item.tiles.join(' ')), 500);
    } else {
      playWrongSound();
    }
  }
  function handleNext() {
    onResult(item.id, wasCorrect ? RATING.GOOD : RATING.AGAIN, item.sourceDeck);
  }
  function handleToggleBookmark() {
    const next = !bookmarked;
    setBookmarkedState(next);
    onToggleBookmark(item, next);
  }

  return (
    <div className="genkou-card">
      <span className="hanko">{item.level}</span>
      <div style={{ marginTop: 8 }}>
        <div className="pattern-plate">
          <div className="meaning-hint" style={{ fontSize: 12, opacity: 0.85 }}>次の文を韓国語で並べ替えてください</div>
          <div className="pattern" style={{ fontSize: 18 }}>{item.meaning}</div>
        </div>

        <div className="sentence-answer-row">
          {placed.length === 0 && <span className="sentence-placeholder">下の断片を順番に押して文を完成させてください</span>}
          {placed.map((t) => {
            let cls = 'tile-btn placed jp-text';
            if (checked) cls += wasCorrect ? ' tile-correct' : ' tile-wrong';
            return <button key={t.id} className={cls} onClick={() => removeTile(t)} disabled={checked}>{t.text}</button>;
          })}
        </div>

        <div className="sentence-pool-row">
          {pool.map((t) => (
            <button key={t.id} className="tile-btn jp-text" onClick={() => placeTile(t)} disabled={checked}>{t.text}</button>
          ))}
        </div>

        {!checked ? (
          <button className="primary-btn" style={{ marginTop: 16 }} disabled={!isComplete} onClick={handleCheck}>確認</button>
        ) : (
          <React.Fragment>
            <div className={'feedback ' + (wasCorrect ? 'feedback-correct' : 'feedback-wrong')}>{wasCorrect ? '正解です!' : '不正解です。'}</div>
            <div className="example">正解: <span className="jp-text">{item.tiles.join(' ')}</span></div>
            <button className="replay-btn" onClick={() => speakKorean(item.reading || item.tiles.join(' '))}>🔊 もう一度聞く</button>
            <div className="action-row">
              <button className={'secondary-btn ' + (bookmarked ? 'active' : '')} onClick={handleToggleBookmark}>{bookmarked ? '★ 復習ノートに追加済み' : '☆ 復習に追加'}</button>
              <button className="primary-btn" onClick={handleNext}>次へ</button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function KrListView({ deckType, items, onRemove }) {
  const SCENES = ['全体', '空港', '食堂', '宿泊先', '道案内', 'ショッピング', '病院', '公共交通', '緊急事態', 'ビジネス'];
  const [scene, setScene] = useState('全体');
  const showSceneFilter = deckType === 'travel';
  const filtered = showSceneFilter && scene !== '全体' ? items.filter((i) => i.scene === scene) : items;
  function primary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.word;
    if (dt === 'grammar') return i.pattern;
    if (dt === 'sentence') return i.tiles.join(' ');
    return i.korean;
  }
  function secondary(i) {
    const dt = deckType === 'review' ? i.sourceDeck : deckType;
    if (dt === 'words') return i.meaningJp;
    if (dt === 'grammar') return i.titleJp;
    if (dt === 'sentence') return i.meaning;
    return i.japanese;
  }
  if (items.length === 0) {
    return deckType === 'review'
      ? <div className="empty-state">復習ノートが空です。<br/>学習中に「☆ 復習に追加」ボタンを押すとここに集まります。</div>
      : <div className="empty-state">まだコンテンツがありません。</div>;
  }
  return (
    <div>
      {showSceneFilter && (<div className="level-tabs">{SCENES.map((s) => (<button key={s} className={scene === s ? 'active' : ''} onClick={() => setScene(s)}>{s}</button>))}</div>)}
      {filtered.length === 0 ? <div className="empty-state">この場面の会話がありません。</div> : (
        <div>
          {filtered.map((i) => (
            <div className="word-row" key={deckType === 'review' ? (i.sourceDeck + '-' + i.id) : i.id}>
              <div className="info">
                <div className="jp">{primary(i)}{deckType === 'review' && <span className="deck-tag" style={{ marginLeft: 6 }}>{KR_DECK_LABELS[i.sourceDeck]}</span>}</div>
                <div className="kr">{secondary(i)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className={'status-badge status-' + i.status}>{STATUS_LABEL[i.status]}</span>
                {deckType === 'review' && <button className="remove-btn" onClick={() => onRemove(i)}>削除</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

          <nav className="tab-bar">
            <button className={tab === 'dashboard' ? 'active' : ''} onClick={() => setTab('dashboard')}>ホーム</button>
            <button className={tab === 'study' ? 'active' : ''} onClick={() => setTab('study')}>学習</button>
            <button className={tab === 'list' ? 'active' : ''} onClick={() => setTab('list')}>リスト</button>
          </nav>
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

// ==================== 로그인 폼 (이메일/비밀번호) ====================

const ERROR_MESSAGES = {
  ja: {
    'auth/email-already-in-use': '이미 가입된 이메일입니다. 로그인을 눌러주세요.',
    'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
    'auth/weak-password': '비밀번호는 6자 이상이어야 합니다.',
    'auth/user-not-found': '가입되지 않은 이메일입니다. 회원가입을 눌러주세요.',
    'auth/wrong-password': '비밀번호가 틀렸습니다.',
    'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
    default: '오류가 발생했습니다. 다시 시도해주세요.',
  },
  kr: {
    'auth/email-already-in-use': 'すでに登録済みのメールアドレスです。ログインを押してください。',
    'auth/invalid-email': 'メールアドレスの形式が正しくありません。',
    'auth/weak-password': 'パスワードは6文字以上にしてください。',
    'auth/user-not-found': '登録されていないメールアドレスです。新規登録を押してください。',
    'auth/wrong-password': 'パスワードが間違っています。',
    'auth/invalid-credential': 'メールアドレスまたはパスワードが正しくありません。',
    default: 'エラーが発生しました。もう一度お試しください。',
  },
};

function LoginForm({ mode }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  function getMessage(code) {
    const table = ERROR_MESSAGES[mode];
    return table[code] || table.default;
  }

  function handleSignIn() {
    setError('');
    setLoading(true);
    signInWithEmail(email, password).catch((e) => setError(getMessage(e.code))).finally(() => setLoading(false));
  }
  function handleSignUp() {
    setError('');
    setLoading(true);
    signUpWithEmail(email, password).catch((e) => setError(getMessage(e.code))).finally(() => setLoading(false));
  }

  return (
    <div className="login-box">
      <p>
        {mode === 'ja'
          ? <React.Fragment>PC와 모바일에서 학습 진도를 이어보려면<br/>이메일로 로그인하세요.</React.Fragment>
          : <React.Fragment>パソコンとスマートフォンで学習の進み具合を引き継ぐには、<br/>メールアドレスでログインしてください。</React.Fragment>}
      </p>
      <input type="email" className="login-input" placeholder={mode === 'ja' ? '이메일' : 'メールアドレス'} value={email} onChange={(e) => setEmail(e.target.value)} />
      <input type="password" className="login-input" placeholder={mode === 'ja' ? '비밀번호 (6자 이상)' : 'パスワード（6文字以上）'} value={password} onChange={(e) => setPassword(e.target.value)} />
      {error && <div className="login-error">{error}</div>}
      <div className="action-row">
        <button className="secondary-btn" onClick={handleSignUp} disabled={loading}>{mode === 'ja' ? '회원가입' : '新規登録'}</button>
        <button className="primary-btn" onClick={handleSignIn} disabled={loading}>{mode === 'ja' ? '로그인' : 'ログイン'}</button>
      </div>
    </div>
  );
}

// ==================== 최상위 App ====================

const MODE_META = {
  ja: { title: '日本語学習', subtitle: '단어 · 문법 · 한자 · 회화' },
  kr: { title: '韓国語学習', subtitle: '単語・文法・会話' },
};

function App() {
  const [user, setUser] = useState(undefined);
  const [mode, setMode] = useState('ja');
  const userStats = useUserStats(user);

  useEffect(() => {
    const unsub = subscribeToAuth(setUser);
    return () => unsub();
  }, []);

  const meta = MODE_META[mode];

  return (
    <div className="app-shell">
      <header className="app-header">
        <div>
          <h1 className="jp-text">{meta.title}</h1>
          <div className="subtitle">{meta.subtitle}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {user && (userStats.streak > 0 || userStats.xp > 0) && (
            <div className="streak-badge mono" title={mode === 'ja' ? '연속 학습일 · 누적 XP' : '連続学習日数・累計XP'}>
              🔥{userStats.streak} · ⭐{userStats.xp}
            </div>
          )}
          {user && (
            <button onClick={signOutUser} style={{ background: 'none', border: 'none', fontSize: 12, color: 'var(--ink-soft)', cursor: 'pointer' }}>
              {mode === 'ja' ? '로그아웃' : 'ログアウト'}
            </button>
          )}
        </div>
      </header>

      <div className="deck-switch" style={{ marginBottom: 18 }}>
        <button className={mode === 'ja' ? 'active' : ''} onClick={() => setMode('ja')}>日本語</button>
        <button className={mode === 'kr' ? 'active' : ''} onClick={() => setMode('kr')}>한국어</button>
      </div>

      {user === undefined ? (
        <div className="empty-state">{mode === 'ja' ? '불러오는 중...' : '読み込み中...'}</div>
      ) : user === null ? (
        <LoginForm mode={mode} />
      ) : mode === 'ja' ? (
        <JaSection user={user} onActivity={userStats.recordActivity} />
      ) : (
        <KrSection user={user} onActivity={userStats.recordActivity} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
